<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>NEXUS // FIELD RECORDER v3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a12;
        --bg2: #12121f;
        --fg: #00ffff;
        --fg2: #ff00ff;
        --acc: #00ff88;
        --acc2: #ff3366;
        --glow: rgba(0, 255, 255, 0.5);
        --grid: rgba(0, 255, 255, 0.08);
        --warn: #ffaa00;
      }
      [data-theme='synthwave'] {
        --bg: #1a0a2e;
        --bg2: #2d1b4e;
        --fg: #ff00ff;
        --fg2: #00ffff;
        --acc: #ff6ec7;
        --acc2: #ffaa00;
      }
      [data-theme='cyberpunk'] {
        --bg: #0d0d0d;
        --bg2: #1a1a1a;
        --fg: #f0e68c;
        --fg2: #ff0080;
        --acc: #00ff41;
        --acc2: #ff073a;
      }
      [data-theme='retro8bit'] {
        --bg: #0f0f0f;
        --bg2: #1a1a0a;
        --fg: #33ff00;
        --fg2: #ffb000;
        --acc: #00ff88;
        --acc2: #ff4444;
      }
      [data-theme='midnight'] {
        --bg: #0a1628;
        --bg2: #0f2140;
        --fg: #87ceeb;
        --fg2: #c0c0c0;
        --acc: #4169e1;
        --acc2: #ffd700;
      }
      [data-theme='vaporwave'] {
        --bg: #1a0a20;
        --bg2: #2d1536;
        --fg: #ff71ce;
        --fg2: #01cdfe;
        --acc: #b967ff;
        --acc2: #05ffa1;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'Share Tech Mono', monospace;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
        overflow-x: hidden;
      }
      .font-orb {
        font-family: 'Orbitron', sans-serif;
      }
      .grid-bg {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        perspective: 500px;
      }
      .grid-floor {
        position: absolute;
        bottom: -50%;
        left: -50%;
        width: 200%;
        height: 60%;
        background:
          linear-gradient(var(grid) 1px, transparent 1px),
          linear-gradient(90deg, var(grid) 1px, transparent 1px);
        background-size: 50px 50px;
        transform: rotateX(60deg);
        transform-origin: center bottom;
        animation: gridM 4s linear infinite;
      }
      @keyframes gridM {
        to {
          background-position: 0 50px;
        }
      }
      .scanlines {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 999;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px
        );
      }
      #particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }
      .console {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        position: relative;
        z-index: 10;
      }
      .header {
        background: linear-gradient(180deg, var(--bg2), transparent);
        border-bottom: 1px solid var(--fg);
        padding: 0.5rem 0.85rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
      }
      .logo {
        font-family: 'Orbitron';
        font-weight: 900;
        font-size: 1rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--fg);
        text-shadow: 0 0 8px var(--glow);
      }
      .status {
        display: flex;
        gap: 0.6rem;
        font-size: 0.62rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        align-items: center;
        flex-wrap: wrap;
      }
      .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--acc);
        box-shadow: 0 0 5px var(--acc);
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        50% {
          opacity: 0.5;
          transform: scale(0.9);
        }
      }
      .main {
        flex: 1;
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 0.6rem;
        padding: 0.6rem;
      }
      @media (max-width: 768px) {
        .main {
          grid-template-columns: 1fr;
        }
      }
      .sidebar {
        background: linear-gradient(135deg, var(--bg2), rgba(18, 18, 31, 0.9));
        border: 1px solid var(--fg);
        border-radius: 5px;
        padding: 0.5rem;
      }
      .nav-title {
        font-size: 0.65rem;
        letter-spacing: 0.1em;
        color: var(--fg2);
        margin-bottom: 0.4rem;
        font-family: 'Orbitron';
        padding-bottom: 0.35rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .nav-list {
        list-style: none;
      }
      .nav-item {
        margin-bottom: 2px;
      }
      .nav-btn {
        width: 100%;
        text-align: left;
        padding: 0.45rem.55rem;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 4px;
        color: var(--fg);
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        font-size: 0.78rem;
        transition: 0.15s;
      }
      .nav-btn:hover {
        background: rgba(255, 255, 255, 0.05);
        border-color: var(--fg);
      }
      .nav-btn.active {
        background: rgba(255, 255, 255, 0.07);
        border-color: var(--fg2);
        color: var(--fg2);
      }
      .arrow {
        transition: transform 0.2s;
        font-size: 0.65em;
      }
      .nav-btn.open .arrow {
        transform: rotate(90deg);
      }
      .sub {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.2s;
        padding-left: 0.5rem;
      }
      .sub.show {
        max-height: 200px;
      }
      .sub-item {
        padding: 0.3rem.45rem;
        border-left: 2px solid transparent;
        font-size: 0.72rem;
        color: rgba(255, 255, 255, 0.5);
        cursor: pointer;
        transition: 0.12s;
      }
      .sub-item:hover {
        color: var(--fg);
        border-left-color: var(--fg);
      }
      .sub-item.sel {
        color: var(--acc);
        border-left-color: var(.acc);
      }
      .panel {
        background: linear-gradient(135deg, rgba(18, 18, 31, 0.95), var(--bg2));
        border: 1px solid var(--fg);
        border-radius: 5px;
        padding: 0.7rem;
        position: relative;
        overflow: hidden;
      }
      .panel::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(90deg, var(--fg2), var(--fg));
      }
      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.6rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .panel-title {
        font-family: 'Orbitron';
        font-size: 0.88rem;
        letter-spacing: 0.05em;
      }
      .view {
        display: none;
      }
      .view.active {
        display: block;
      }
      .btn {
        padding: 0.28rem.58rem;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 3px;
        color: var(--fg);
        font-family: inherit;
        font-size: 0.64rem;
        cursor: pointer;
        text-transform: uppercase;
        letter-spacing: 0.03em;
        transition: 0.12s;
      }
      .btn:hover {
        background: var(--fg);
        color: var(--bg);
      }
      .btn.on {
        background: var(--fg);
        color: var(--bg);
      }
      .btn.playing {
        background: var(--acc);
        color: #000;
        border-color: var(--acc);
      }
      .btn.warn {
        background: var(--warn);
        color: #000;
        border-color: var(--warn);
      }

      /* APP */
      .app-wrap {
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid var(--fg);
        border-radius: 5px;
        overflow: hidden;
      }
      .app-bar {
        background: var(--bg2);
        padding: 0.3rem.55rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-wrap: wrap;
        gap: 0.35rem;
      }
      .app-name {
        font-family: 'Orbitron';
        font-size: 0.72rem;
      }
      .app-body {
        padding: 0.55rem;
        max-height: 72vh;
        overflow-y: auto;
      }

      /* Swing */
      .swing-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(0, 0, 0, 0.25);
        padding: 0.38rem.55rem;
        border-radius: 4px;
        margin-bottom: 0.5rem;
      }
      .swing-label {
        font-family: 'Orbitron';
        font-size: 0.64rem;
        color: var(--fg2);
      }
      .swing-slider {
        flex: 1;
        -webkit-appearance: none;
        height: 5px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 2px;
        outline: none;
      }
      .swing-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        background: var(--acc);
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 0 6px var(--acc);
      }

      /* Tracks */
      .fr-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }
      @media (max-width: 800px) {
        .fr-grid {
          grid-template-columns: 1fr;
        }
      }
      .track {
        background: rgba(0, 0, 0, 0.35);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        padding: 0.55rem;
        margin-bottom: 0.5rem;
      }
      .track-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.35rem;
        padding-bottom: 0.28rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }
      .track-name {
        font-size: 0.66rem;
        color: var(--fg2);
        font-family: 'Orbitron';
        display: flex;
        align-items: center;
        gap: 0.25rem;
      }
      .trk-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--acc2);
        opacity: 0.25;
        transition: 0.2s;
      }
      .trk-dot.live {
        opacity: 1;
        animation: pulse 0.8s infinite;
      }
      .trk-btns {
        display: flex;
        gap: 0.25rem;
      }
      .trk-btn {
        padding: 0.14rem.32rem;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        font-size: 0.54rem;
        cursor: pointer;
        color: var(--fg);
        transition: 0.12s;
      }
      .trk-btn.on {
        background: var(--acc2);
        color: #fff;
      }
      .trk-btn.solo-on {
        background: var(--fg);
        color: var(--bg);
      }
      .track-hint {
        font-size: 0.56rem;
        color: rgba(255, 255, 255, 0.35);
        margin-bottom: 0.35rem;
        line-height: 1.3;
      }

      /* Pads v2 - with waveform */
      .pad-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 3px;
      }
      .pad {
        aspect-ratio: 1;
        border-radius: 3px;
        border: 1.5px solid rgba(255, 255, 255, 0.12);
        cursor: pointer;
        position: relative;
        user-select: none;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .pad:active,
      .pad.hit {
        transform: scale(0.94);
        filter: brightness(1.4);
      }
      .pad-bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        transition: opacity 0.15s;
      }
      .pad.kick .pad-bg {
        background: linear-gradient(135deg, #b32d00, #801f00);
      }
      .pad.snare .pad-bg {
        background: linear-gradient(135deg, #b35900, #803f00);
      }
      .pad.hat .pad-bg {
        background: linear-gradient(135deg, #555522, #333311);
      }
      .pad.perc .pad-bg {
        background: linear-gradient(135deg, #552288, #331166);
      }
      .pad.echo .pad-bg {
        background: linear-gradient(135deg, #005577, #003344);
      }
      .pad.birp .pad-bg {
        background: linear-gradient(135deg, #882255, #551133);
      }
      .pad.synth .pad-bg {
        background: linear-gradient(135deg, #228844, #114422);
      }
      .pad-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }
      .pad-label {
        font-size: 0.52rem;
        font-family: 'Orbitron';
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.8);
        pointer-events: none;
      }
      .pad-wave {
        position: absolute;
        bottom: 2px;
        left: 10%;
        right: 10%;
        height: 3px;
        display: none;
      }
      .pad.has-sound .pad-wave {
        display: block;
        background: var(--acc);
        opacity: 0.7;
      }
      .pad-has-file::after {
        content: '';
        position: absolute;
        top: 2px;
        right: 2px;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--acc);
        box-shadow: 0 0 4px var(.acc);
        z-index: 2;
      }

      /* Sampler controls per pad */
      .pad-fx-row {
        display: flex;
        gap: 2px;
        margin-top: 2px;
        opacity: 0;
        transition: opacity 0.15s;
      }
      .pad:hover .pad-fx-row,
      .pad.selected .pad-fx-row {
        opacity: 1;
      }
      .pfx-btn {
        flex: 1;
        padding: 1px;
        font-size: 0.48px;
        text-align: center;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 1px;
        color: rgba(255, 255, 255, 0.6);
        cursor: pointer;
      }
      .pfx-btn:hover {
        background: var(--fg);
        color: var(--bg);
      }

      /* FX Section - now real */
      .fx-section {
        background: rgba(0, 0, 0, 0.25);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        padding: 0.45rem;
        margin-top: 0.35rem;
      }
      .fx-title {
        font-size: 0.6rem;
        color: var(--fg2);
        font-family: 'Orbitron';
        margin-bottom: 0.3rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .fx-toggle {
        width: 22px;
        height: 12px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 6px;
        position: relative;
        cursor: pointer;
        transition: 0.15s;
      }
      .fx-toggle.on {
        background: var(--acc);
      }
      .fx-toggle::after {
        content: '';
        position: absolute;
        top: 1px;
        left: 1px;
        width: 10px;
        height: 10px;
        background: #fff;
        border-radius: 50%;
        transition: transform 0.15s;
      }
      .fx-toggle.on::after {
        transform: translateX(10px);
      }
      .fx-knobs {
        display: flex;
        gap: 0.4rem;
        flex-wrap: wrap;
      }
      .fx-knob {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1px;
        min-width: 42px;
      }
      .fx-knob label {
        font-size: 0.48rem;
        color: rgba(255, 255, 255, 0.35);
        text-transform: uppercase;
      }
      .fx-knob span {
        font-size: 0.58rem;
        color: var(--acc);
      }
      input[type='range'].fx-r {
        width: 38px;
        height: 3px;
        -webkit-appearance: none;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        outline: none;
      }
      input[type='range'].fx-r::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 9px;
        height: 9px;
        background: var(--fg);
        border-radius: 50%;
        cursor: pointer;
      }

      /* Sequencer v2 */
      .seq-sec {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        padding: 0.5rem;
        margin-top: 0.5rem;
      }
      .seq-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.35rem;
      }
      .seq-grid {
        display: grid;
        grid-template-columns: repeat(16, 1fr);
        gap: 2px;
      }
      .seq-step {
        aspect-ratio: 1;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        transition: 0.1s;
      }
      .seq-step:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .seq-step.filled {
        background: var(--acc);
        border-color: var(--acc);
        box-shadow: 0 0 5px var(.acc);
      }
      .seq-step.now {
        box-shadow:
          inset 0 0 8px rgba(255, 255, 255, 0.5),
          0 0 0 1.5px var(--fg);
      }
      .seq-step-len {
        position: absolute;
        bottom: 1px;
        left: 2px;
        right: 2px;
        height: 2px;
        background: rgba(255, 255, 255, 0.4);
        border-radius: 1px;
      }
      .seq-prob {
        position: absolute;
        top: 1px;
        right: 1px;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        font-size: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: rgba(255, 255, 255, 0.5);
      }
      .seq-controls {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.4rem;
        align-items: center;
        flex-wrap: wrap;
        font-size: 0.64rem;
      }
      .pattern-tabs {
        display: flex;
        gap: 2px;
        margin-bottom: 0.35rem;
      }
      .pat-tab {
        padding: 0.2rem.4rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        font-size: 0.58rem;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.5);
        transition: 0.1s;
      }
      .pat-tab.active {
        background: var(--fg2);
        color: var(--bg);
        border-color: var(--fg2);
      }
      .pat-tab.has-content::after {
        content: '';
        display: inline-block;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: var(--acc);
        margin-left: 3px;
      }

      /* Mixer v2 */
      .mix-sec {
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 4px;
        padding: 0.5rem;
        margin-top: 0.5rem;
      }
      .mix-title {
        font-size: 0.64rem;
        color: var(--fg2);
        font-family: 'Orbitran';
        margin-bottom: 0.4rem;
      }
      .mix-channels {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .mix-chan {
        display: grid;
        grid-template-columns: 70px 1fr 40px 40px 30px 30px;
        gap: 0.3rem;
        align-items: center;
        padding: 0.25rem;
        background: rgba(255, 255, 255, 0.02);
        border-radius: 3px;
        font-size: 0.58rem;
      }
      .mix-chan-name {
        color: var(--fg2);
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mix-meter {
        height: 20px;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        position: relative;
        overflow: hidden;
      }
      .mix-meter-fill {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: linear-gradient(to top, var(--acc), #cc0, var(--acc2));
        transition: 0.04s linear;
      }
      .mix-fader {
        -webkit-appearance: none;
        width: 100%;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        outline: none;
      }
      .mix-fader::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 10px;
        height: 10px;
        background: var(--fg);
        border-radius: 50%;
        cursor: pointer;
      }
      .mix-pan {
        -webkit-appearance: none;
        width: 30px;
        height: 4px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 2px;
        outline: none;
      }
      .mix-pan::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 8px;
        height: 8px;
        background: var(--fg2);
        border-radius: 50%;
        cursor: pointer;
      }
      .mix-solo,
      .mix-mute {
        padding: 0.15rem.3rem;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 2px;
        font-size: 0.5rem;
        cursor: pointer;
        background: rgba(255, 255, 255, 0.05);

      .status-bar {

      .status-bar.ready {

      .req-indicator {

      .footer {

      .ticker-text {
        display: inline-block;
        animation: ticker 25s linear infinite;

      }
      @keyframes ticker {
        to {
          transform: translateX(-100%);
        }
      }
      .news-dot {
        position: absolute;
        top: -2px;

        width: 7px;

      }
      .file-input {
        display: none;

      .upl-btn {
        display: inline-block;
        padding: 0.28rem.5rem;
        background: rgba(255, 255, 255, 0.05);
        border: 1px dashed rgba(255, 255, 255, 0.18);
        border-radius: 3px;
        color: var(--fg);
        font-size: 0.6rem;
        cursor: pointer;
        transition: 0.1s;
      }
      .upl-btn:hover {
        border-style: solid;
        border-color: var(--fg);
      }
      @media (max-width: 640px) {
        .logo {

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body data-theme="default">

    <div class="console">

        <section class="panel">

                    "

                ></div>

              id="logBox"

      <footer class="footer">
        <div><span style="color: var(--acc)">READY</span>| v3.0</div>
        <div class="ticker">
          <span class="ticker-text"
            >FIELD RECORDER v3 // UPGRADED SAMPLER + REAL FX + PATTERN CHAINS + MIXER WITH
            SOLO/MUTE</span
          >
        </div>
        <div>CONNECTED</div>

    </div>

    <script>
      // ========== GLOBAL ==========
      const S={snd:true,vol:.7,acx:null,themeNames:{default:'TRON',synthwave:'Synthwave',cyberpunk:'Cyberpunk',retro8bit:'8-Bit',midnight:'Midnight',vaporwave:'Vaporwave'}};
      function initAudio(){if(!S.acx)S.acx=new(AudioContext||webkitAudioContext)();if(S.acx.state==='suspended')S.acx.resume()}
      document.addEventListener('click',initAudio,{once:true});
      function blip(t){if(!S.snd||!S.acx)return;const o=S.acx.createOscillator(),g=S.acx.createGain();o.connect(g);g.connect(S.acx.destination);g.gain.setValueAtTime(S.vol*.18,S.acx.currentTime);g.gain.exponentialRampToValueAtTime(.001,S.acx.currentTime+.09);if(t==='ok'){o.frequency.value=523;o.type='triangle'}else if(t==='warn'){o.frequency.value=180;o.type='sawtooth'}o.start();o.stop(S.acx.currentTime+.1)}

      // Particles
      const pCan=document.getElementById('particles'),pCtx=pCan.getContext('2d');let parts=[];
      function resizeP(){pCan.width=innerWidth;pCan.height=innerHeight}
      function mkParts(){parts=[];for(let i=0;i<32;i++)parts.push({x:Math.random()*pCan.width,y:Math.random()*pCan.height,sz:Math.max(.5,Math.random()*1.8),vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,a:Math.random()*.45+.12})}
      function drawP(){pCtx.clearRect(0,0,pCan.width,pCan.height);const c1=getComputedStyle(document.body).getPropertyValue('--fg').trim()||'#00ffff',c2=getComputedStyle(document.body).getPropertyValue('--fg2').trim()||'#ff00ff';parts.forEach((p,i)=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=pCan.width;if(p.x>pCan.width)p.x=0;if(p.y<0)p.y=pCan.height;if(p.y>pCan.height)p.y=0;pCtx.beginPath();pCtx.arc(p.x,p.y,Math.max(.4,p.sz),0,Math.PI*2);pCtx.fillStyle=i%2?c1:c2;pCtx.globalAlpha=p.a;pCtx.fill();parts.slice(i+1).forEach(q=>{const d=Math.hypot(p.x-q.x,p.y-q.y);if(d<80){pCtx.beginPath();pCtx.moveTo(p.x,p.y);pCtx.lineTo(q.x,q.y);pCtx.strokeStyle=c1;pCtx.globalAlpha=(1-d/80)*.08;pCtx.stroke()}})});pCtx.globalAlpha=1;requestAnimationFrame(drawP)}

      // Theme/Nav
      function setTheme(t){document.body.dataset.theme=t;document.querySelectorAll('.th-sel').forEach(b=>b.classList.toggle('on',b.dataset.t===t));document.getElementById('themeName').textContent=S.themeNames[t]||t;blip('ok')}
      function toggleNav(btn){const sub=btn.nextElementSibling;const open=sub.classList.contains('show');document.querySelectorAll('.sub').forEach(s=>s.classList.remove('show'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('open'));if(!open){sub.classList.add('show');btn.classList.add('open')}else btn.classList.add('open');blip('ok')}
      function showView(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));const el=document.getElementById('v'+v.charAt(0).toUpperCase()+v.slice(1));if(el)el.classList.add('active');blip('ok');if(v!=='fr')stopPlayback()}

      // Log
      function log(type,msg){const box=document.getElementById('logBox');t=new Date().toLocaleTimeString('de-DE',{hour12:false});const e=document.createElement('div');e.style.cssText='padding:.3rem;border-left:2px solid '+(type==='warn'?'var(--acc2)':'var(--acc)')+'font-size:.72rem;margin-bottom:.25rem';e.innerHTML='<div style="font-size:.55rem;color:rgba(255,255,255,.3)">'+t+'</div>'+msg;box.insertBefore(e,box.firstChild);while(box.children.length>28)box.removeChild(box.lastChild);document.getElementById('newsDot').style.display='inline'}
      function clearLog(){document.getElementById('logBox').innerHTML='';document.getElementById('newsDot').style.display='none'}
      function tick(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('de-DE',{hour12:false})}

      // =============================================
      // FIELD RECORDER v3 - UPGRADED
      // =============================================

      // State - fully initialized before any UI renders
      let FR = {
        ctx:null,
        masterGain:null,
        analyser:null,
        compNode:null,

        tracks:{},
        patterns:[],      // array of arrays of {trk,snd,len,prob}
        currentPattern:0,
        maxPatterns:4,

        sequence:new Array(32).fill(null),
        stepCount:16,
        currentStep:0,
        isPlaying:false,
        intervalId:null,
        tempo:92,
        swing:67,
        selectedStep:null,

        // Per-pad sampler state
        padState:{},     // {trk_snd: {buf, reversed, pitch, start, end, gain}}

        // Real FX nodes per track
        fxNodes:{},

        // Mixer state
        mixVol:{drums:.75,echoes:.65,birps:.6,synth:.7},
        mixPan:{drums:0,echoes:-.3,birps:.2,synth:0},
        mixSolo:{drums:false,echoes:false,birps:false,synth:false},
        mixMute:{drums:false,echoes:false,birps:false,synth:false},

        hasContent:{drums:false,echoes:false,birps:false,synth:false},

        // Recording
        recording:false,
        recStartTime:0,
        recordedSteps:[],

        masterVol:.72,
        limiterOn:true
      };

      // Track definitions
      const TRACK_DEFS=[
        {id:'drums',name:'DRUMS',color:'#cc3300',fx:['crunch','lofi','pan'],hasGen:false},
        {id:'echoes',name:'ECHOES',color:'#006699',fx:['reverb','delay','decay'],hasGen:true},
        {id:'birps',name:'BIRPS',color:'#882255',fx:['bitcrush','warp','freq'],hasGen:true},
        {id:'synth',name:'SYNTH ARP',color:'#228844',fx:['cut','reso','rate'],hasGen:true,isSynth:true}
      ];

      const PAD_DEFS={
        drums:[
          {snd:'kick',label:'KICK'},
          {snd:'snare',label:'SNARE'},
          {snd:'hat',label:'HAT'},
          {snd:'perc',label:'PERC'}
        ],
        echoes:[
          {snd:'echo1',label:'ECHO 1'},
          {snd:'echo2',label:'ECHO 2'},
          {snd:'atmos',label:'ATMOS'},
          {snd:'noise',label:'NOISE',gen:true}
        ],
        birps:[
          {snd:'static',label:'STATIC',gen:true},
          {snd:'glitch',label:'GLITCH',gen:true},
          {snd:'radio',label:'RADIO',gen:true},
          {snd:'vinyl',label:'VINYL',gen:true}
        ],
        synth:[
          {snd:'minor',label:'MINOR',isArp:true},
          {snd:'major',label:'MAJOR',isArp:true},
          {snd:'penta',label:'PENTA',isArp:true},
          {snd:'blues',label:'BLUES',isArp:true}
        ]
      };

      function buildUI(){
        const body=document.getElementById('frBody');

        // Swing bar
        let h='<div class="swing-bar"><span class="swing-label">SWING</span>';
        h+='<input type="range"class="swing-slider"min="0"max="100"value="67"oninput="FR.swing=+this.value;document.getElementById(\'swVal\').textContent=this.value+\'%\'">';
        h+='<span class="fx-val"style="color:var(--acc);min-width:32px"id="swVal">67%</span></div>';

        // Tracks grid
        h+='<div class="fr-grid">';

        TRACK_DEFS.forEach(trk=>{
          const pads=PAD_DEFS[trk.id];
          h+='<div class="track"data-trk="'+trk.id+'">';

          // Header
          h+='<div class="track-head">';
          h+='<span class="track-name"><span class="trk-dot"id="dot_'+trk.id+'"></span>'+trk.name;
          if(trk.id!=='synth')h+=' <span class="req-tag">REQ</span>';
          h+='</span>';
          h+='<div class="trk-btns">';
          h+='<button class="trk-btn"id="mute_'+trk.id+'"onclick="toggleMute(\''+trk.id+'\')">M</button>';
          h+='<button class="trk-btn"id="solo_'+trk.id+'"onclick="toggleSolo(\''+trk.id+'\')">S</button>';
          if(trk.fx)h+='<button class="trk-btn"onclick="toggleFXPanel(\''+trk.id+'\')">FX</button>';
          h+='</div></div>';

          // Hint
          h+='<div class="track-hint">'+(trk.hasGen?'Click pads to generate OR upload samples':'Upload samples or generate sounds')+'</div>';

          // Pads
          h+='<div class="pad-grid">';
          pads.forEach(pad=>{
            const key=trk.id+'_'+pad.snd;
            h+='<div class="pad '+trk.id+'"data-trk="'+trk.id+'"data-snd="'+pad.snd+'"id="pad_'+key+'"';
            h+='onmousedown="hitPad(this,event)"ontouchstart="hitPad(this,event)"';
            if(!pad.gen&&!pad.isArp)h+='oncontextmenu="uplSample(event,this)"';
            h+='>';
            h+='<div class="pad-bg"></div>';
            h+='<div class="pad-content">';
            h+='<span class="pad-label">'+pad.label+'</span>';
            h+='<div class="pad-wave"id="wave_'+key+'"></div>';
            // Sampler mini-controls
            if(!pad.isArp){
              h+='<div class="pad-fx-row">';
              h+='<span class="pfx-btn"title="Reverse"onclick="event.stopPropagation();reversePad(\''+trk.id+'\',\''+pad.snd+'\')">↺</span>';
              h+='<span class="pfx-btn"title="Pitch up"onclick="event.stopPropagation();pitchPad(\''+trk.id+'\',\''+pad.snd'\',1)">▲</span>';
              h+='<span class="pfx-btn"title="Pitch down"onclick="event.stopPropagation();pitchPad(\''+trk.id+'\',\''+pad.snd'\',-1)">▼</span>';
              h+='</div>';
            }
            h+='</div></div>';

            // Init pad state
            FR.padState[key]={buf:null,reversed:false,pitch:1,gain:1,start:0,end:1};
          });
          h+='</div>';

          // FX Panel (hidden by default)
          if(trk.fx){
            h+='<div class="fx-section"id="fxPanel_'+trk.id+'"style="display:none">';
            h+='<div class="fx-title"><span>'+trk.name+' FX</span>';
            h+='<div class="fx-toggle"id="fxOn_'+trk.id+'"onclick="toggleFXOn(\''+trk.id+'\')"></div></div>';
            h+='<div class="fx-knobs">';
            trk.fx.forEach(fx=>{
              h+='<div class="fx-knob"><label>'+fx+'</label>';
              h+='<input type="range"class="fx-r"min="0"max="100"value="'+(fx==='pan'?50:40)+'"oninput="applyRealFX(\''+trk.id+'\',\''+fx+'\','+this.value+')">';
              h+='<span id="fxv_'+trk.id+'_'+fx+'">'+(fx==='pan'?'C':40)+'</span></div>';
            });
            h+='</div></div>';
          }

          // Upload button for non-gen tracks
          if(!trk.hasGen&&trk.id!=='synth'){
            h+='<label class="upl-btn"style="margin-top:.35rem;width:100%;text-align:center">Upload Loop/Sample<input type="file"accept="audio/*"class="file-input"onchange="uplTrackSample(event,\''+trk.id+'\')"></label>';
          } else if(trk.id==='synth'){
            h+='<select style="margin-top:.35rem;width:100%;font-size:.6rem;background:var(--bg2);color:var(--fg);border:1px solid rgba(255,255,255,.12);border-radius:3px;padding:.15rem"onchange="FR.tracks.synth.waveType=this.value">';
            ['triangle','sine','square','sawtooth'].forEach(w=>h+='<option value="'+w+'"'+(w==='triangle'?'selected':')+'>'+w.charAt(0).toUpperCase()+w.slice(1)+'</option>');
            h+='</select>';
          }

          h+='</div>';
        });
        h+='</div>'; // end fr-grid

        // Sequencer section with pattern tabs
        h+='<div class="seq-sec">';
        h+='<div class="seq-head"><span class="track-name"style="font-size:.68rem">SEQUENCER</span>';
        h+='<div class="pattern-tabs"id="patTabs"></div></div>';
        h+='<div class="seq-grid"id="seqGrid"></div>';
        h+='<div class="seq-controls">';
        h+='<span>BPM:</span><input type="range"min="60"max="180"value="92"style="width:80px"oninput="FR.tempo=+this.value;document.getElementById(\'tempoV\').textContent=this.value+\' BPM\'"><span id="tempoV"style="color:var(--acc);min-width:36px">92 BPM</span>';
        h+='<span style="margin-left:.5rem">LEN:</span><select style="font-size:.6rem;background:var(--bg2);color:var(--fg);border:1px solid rgba(255,255,255,.1);border-radius:3px;padding:.12rem"onchange="changeStepCount(+this.value)"><option value="8">8</option><option value="16"selected>16</option><option value="32">32</option></select>';
        h+='<button class="btn"style="margin-left:auto"onclick="startRecording()"id="recBtn">● REC</button>';
        h+='<button class="btn"onclick="clearPattern()">CLEAR</button>';
        h+='</div></div>';

        // Mixer section
        h+='<div class="mix-sec">';
        h+='<div class="mix-title">MIXER <span style="font-size:.5rem;font-weight:normal;color:rgba(255,255,255,.4)">(with Solo / Mute / Pan)</span></div>';
        h+='<div class="mix-channels"id="mixChannels"></div>';
        h+='<div class="mix-master">';
        h+='<div><span style="font-size:.5rem;color:rgba(255,255,255,.4)">L</span><div class="master-vu-l"><div class="master-vu-fill"id="vuL"style="height:0%"></div></div></div>';
        h+='<div><span style="font-size:.5rem;color:rgba(255,255,255,.4)">R</span><div class="master-vu-r"><div class="master-vu-fill"id="vuR"style="height:0%"></div></div></div>';
        h+='<div style="display:flex;flex-direction:column;gap:2px;min-width:55px"><span class="fx-label">MASTER</span>';
        h+='<input type="range"style="width:55px"min="0"max="100"value="72"oninput="FR.masterVol=+this.value/100;if(FR.masterGain)FR.masterGain.gain.value=FR.masterVol;document.getElementById(\'mVolV\').textContent=this.value+\'%\'"><span class="fx-val"id="mVolV">72%</span></div>';
        h+='<div class="transport"><button class="trans-btn"id="transBtn"onclick="togglePlay()">PLAY</button><button class="trans-btn"onclick="stopPlayback()">STOP</button><button class="trans-btn warn"onclick="bounceRender()">BOUNCE</button></div>';
        h+='</div></div>';

        // Status bar
        h+='<div class="status-bar"id="statusBar">';
        h+='<span class="req-indicator">';
        h+='<span class="req-dot unmet"id="reqDrums">D</span>';
        h+='<span class="req-dot unmet"id="reqEchoes">E</span>';
        h+='<span class="req-dot unmet"id="reqBirps">B</span>';
        h+='<span class="req-dot unmet"id="reqSynth">S</span>';
        h+='</span>';
        h+='<span id="statusText">INIT AUDIO → Fill all 4 tracks → Assign sequencer → PLAY</span>';
        h+='</div>';

        body.innerHTML=h;

        // Initialize patterns array
        for(let i=0;i<FR.maxPatterns;i++)FR.patterns[i]=new Array(32).fill(null);
        FR.sequence=FR.patterns[0];

        // Build pattern tabs
        buildPatTabs();

        // Build sequencer grid
        buildSeqGrid();

        // Build mixer channels
        buildMixer();

        // Initialize track objects
        TRACK_DEFS.forEach(t=>{
          FR.tracks[t.id]={
            gainNode:null,
            panNode:null,
            fxChain:[],
            muted:false,
            soloed:false,
            bufs:{},
            osc:null,
            oscGain:null,
            filter:null,
            waveType:'triangle'
          };
        });

        changeStepCount(16);
      }

      function buildPatTabs(){
        const container=document.getElementById('patTabs');
        container.innerHTML='';
        for(let i=0;i<FR.maxPatterns;i++){
          const tab=document.createElement('div');
          tab.className='pat-tab'+(i===0?' active':'');
          tab.textContent='PAT '+(i+1);
          tab.onclick=function(){switchPattern(i)};
          tab.id='patTab'+i;
          container.appendChild(tab);
        }
      }

      function switchPattern(idx){
        // Save current pattern first
        FR.patterns[FR.currentPattern]=FR.sequence.slice();
        // Load new
        FR.currentPattern=idx;
        FR.sequence=FR.patterns[idx];
        // Update tabs
        document.querySelectorAll('.pat-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
        // Rebuild grid
        buildSeqGrid();
        updateStatus('Pattern '+(idx+1));
      }

      function buildSeqGrid(){
        const g=document.getElementById('seqGrid');
        if(!g)return;
        g.innerHTML='';
        for(let i=0;i<FR.stepCount;i++){
          const s=document.createElement('div');
          s.className='seq-step';
          s.dataset.idx=i;
          s.onclick=function(){selectStep(i)};

          // Length indicator
          const lenDiv=document.createElement('div');
          lenDiv.className='seq-step-len';

          // Prob indicator
          const probDiv=document.createElement('div');
          probDiv.className='seq-prob';
          probDiv.title='Probability';
          probDiv.textContent='◆';
          probDiv.onclick=function(e){e.stopPropagation();cycleProb(i)};

          s.appendChild(lenDiv);
          s.appendChild(probDiv);
          g.appendChild(s);
        }
        refreshSeqDisplay();
      }

      function refreshSeqDisplay(){
        document.querySelectorAll('#seqGrid .seq-step').forEach((s,i)=>{
          const item=FR.sequence[i];
          s.classList.toggle('filled',!!item);
          s.querySelector('.seq-step-len').style.width=item?(item.len||50)+'%':'0%';
          s.querySelector('.seq-prob').style.color=item&&(item.prob!==undefined)?(item.prob<33?'var(--acc2)':item.prob<66?'var(--warn)':'var(--acc)'):'rgba(255,255,255,.3)';
          // Show pad name as title
          if(item)s.title=item.trk+'/'+item.snd+(item.len?', len:'+item.len:'')+(item.prob!==undefined?', prob:'+item.prob:'');
        });
      }

      function cycleProb(stepIdx){
        const item=FR.sequence[stepIdx];
        if(!item)return;
        if(item.prob===undefined)item.prob=100;
        else if(item.prob===100)item.prob=75;
        else if(item.prob===75)item.prob=50;
        else if(item.prob===50)item.prob=25;
        else item.prob=100;
        refreshSeqDisplay();
      }

      function changeStepCount(n){
        FR.stepCount=n;
        FR.sequence=new Array(32).fill(null);
        buildSeqGrid();
      }

      function buildMixer(){
        const c=document.getElementById('mixChannels');
        c.innerHTML='';
        TRACK_DEFS.forEach(t=>{
          c.innerHTML+=`
          <div class="mix-chan">
            <span class="mix-chan-name">${t.name}</span>
            <div class="mix-meter"><div class="mix-meter-fill"id="mix_${t.id}"style="height:0%"></div></div>
            <input type="range"class="mix-fader"min="0"max="100"value="${Math.round(FR.mixVol[t.id]*100)}"oninput="setMixVol('${t.id}',this.value)">
            <input type="range"class="mix-pan"min="-100"max="100"value="${Math.round(FR.mixPan[t.id]*100)}"oninput="setMixPan('${t.id}',this.value)">
            <button class="mix-solo"id="soloMix_${t.id}"onclick="toggleSoloMix('${t.id}')">S</button>
            <button class="mix-mute"id="muteMix_${t.id}"onclick="toggleMuteMix('${t.id}')">M</button>
          </div>`;
        });
      }

      // ========== STEP SELECTION ==========
      function selectStep(idx){
        FR.selectedStep=idx;
        document.querySelectorAll('#seqGrid .seq-step').forEach((s,i)=>s.classList.toggle('now',i===idx));
        updateStatus('Step '+(idx+1)+' selected — click pad to assign (scroll wheel on step for length)');
      }

      // Seq grid mousewheel for note length
      document.addEventListener('wheel',e=>{
        const step=e.target.closest('.seq-step');
        if(!step)return;
        const idx=parseInt(step.dataset.idx);
        const item=FR.sequence[idx];
        if(item){
          e.preventDefault();
          item.len=((item.len||50)+((e.deltaY<0)?10:-10));
          if(item.len<10)item.len=10;if(item.len>100)item.len=100;
          refreshSeqDisplay();
        }
      },{passive:false});

      // ========== PAD INTERACTION ==========
      function hitPad(el,ev){
        ev.preventDefault();
        initEngine();
        const trk=el.dataset.trk;
        const snd=el.dataset.snd;
        const key=trk+'_'+snd;

        // Visual
        el.classList.add('hit');
        setTimeout(()=>el.classList.remove('hit'),100);

        // If step selected, assign
        if(FR.selectedStep!==null){
          const existing=FR.sequence[FR.selectedStep];
          // If same pad clicked again, remove assignment (toggle off)
          if(existing&&existing.trk===trk&&existing.snd===snd){
            FR.sequence[FR.selectedStep]=null;
          }else{
            FR.sequence[FR.selectedStep]={trk,snd,len:50,prob:100};
          }
          refreshSeqDisplay();
        }

        // Play sound
        playSound(trk,snd);

        // Mark content & flash dot
        if(!FR.hasContent[trk]){
          FR.hasContent[trk]=true;
          const dot=document.getElementById('dot_'+trk);
          if(dot){dot.className='trk-dot met';dot.style.color=getComputedStyle(document.body).getPropertyValue('--acc').trim()}
          checkReady();
        }

        // Flash track meter briefly
        const meter=document.getElementById('mix_'+trk);
        if(meter){meter.style.height='70%';setTimeout(()=>meter.style.height='15%',150)}
      }

      // ========== SOUND PLAYBACK ==========
      function playSound(trk,snd){
        if(!FR||!FR.ctx)return;
        const ps=FR.padState[trk+'_'+snd];
        const bufs=FR.tracks[trk].bufs;

        if(trk==='synth'){
          playArp(snd);
          return;
        }

        // Try pad-state buffer first (may be reversed/pitched)
        let buf=ps?.buf;

        // Fall back to track buffer
        if(!buf)buf=bufs[snd];

        // Generate if needed
        if(!buf&&PAD_DEFS[trk].find(p=>p.snd===snd)?.gen){
          genSound(trk,snd);
          buf=FR.tracks[trk].bufs[snd];
        }

        if(buf)playBufferProcessed(buf,trk,ps);
      }

      function playBufferProcessed(buf,trk,ps){
        try{
          const ctx=FR.ctx;

          // Apply pitch
          let playbackRate=ps?.pitch||1;
          if(ps?.reversed)playbackRate*=-1;

          const src=ctx.createBufferSource();
          src.buffer=buf;
          src.playbackRate.value=Math.abs(playbackRate);

          // Gain
          const g=ctx.createGain();
          g.gain.value=(ps?.gain||1)*(FR.mixVol[trk]||.7);

          // Pan
          const pan=ctx.createStereoPanner();
          pan.pan.value=FR.mixPan[trk]||0;

          // Build FX chain for this track
          let lastNode=g;
          const fxList=FR.tracks[trk].fxChain||[];
          fxList.forEach(fxNode=>{
            if(fxNode&&typeof fxNode.connect==='function'){
              lastNode.connect(fxNode);
              lastNode=fxNode;
            }
          });

          lastNode.connect(pan);
          pan.connect(FR.masterGain);

          src.connect(g);

          // Start position
          const startOffset=ps?.start||0;
          const duration=ps?.end?((ps.end-ps.start)*buf.duration):undefined;

          if(playbackRate<0){
            src.connect(ctx.destination);// fallback for reverse
            // Note: negative playbackRate doesn't work well in all browsers
            // Proper reverse requires buffer reversal before creating source
          }

          src.start(0,startOffset,duration);

          // Store source for potential stop
          src._trk=trk;
          FR._lastSources=FR._lastSources||[];
          FR._lastSources.push(src);

        }catch(e){console.warn('Play error:',e.message)}
      }

      function playBufferSimple(buf,dest){
        if(!buf)return;
        try{
          const s=FR.ctx.createBufferSource();
          s.buffer=buf;s.connect(dest);s.start();
        }catch(e){}
      }

      // ========== SAMPLE UPLOAD ==========
      function uplSample(ev,el){
        const file=ev.target.files[0];if(!file)return;
        initEngine();
        const reader=new FileReader();
        reader.onload=function(ev2){
          FR.ctx.decodeAudioData(ev2.target.result).then(buf=>{
            const key=el.dataset.trk+'_'+el.dataset.snd;
            FR.padState[key].buf=buf;
            drawWaveform(key,buf);
            el.classList.add('has-file');
            updateStatus('Loaded: '+file.name);
            markContent(el.dataset.trk);
          }).catch(()=>updateStatus('Decode failed'))
        };
        reader.readAsArrayBuffer(file);
        ev.target.value='';
      }

      function uplTrackSample(ev,trk){
        const file=ev.target.files[0];if(!file)return;
        initEngine();
        const reader=new FileReader();
        reader.onload=function(ev2){
          FR.ctx.decodeAudioData(ev2.target.result).then(buf=>{
            FR.tracks[trk].bufs.loop=buf;
            FR.hasContent[trk]=true;
            const dot=document.getElementById('dot_'+trk);
            if(dot){dot.className='trk-dot met';dot.style.color='var(--acc)'}
            // Show on first pad
            const pad=document.querySelector('[data-trk='+trk+']');
            if(pad){pad.classList.add('has-file');const key=trk+'_'+pad.dataset.snd;FR.padState[key].buf=buf;drawWaveform(key,buf)}
            checkReady();
            updateStatus('Loop loaded: '+file.name);
          }).catch(()=>updateStatus('Decode failed'))
        };
        reader.readAsArrayBuffer(file);
        ev.target.value='';
      }

      // Waveform drawing on pad
      function drawWaveform(key,buf){
        const el=document.getElementById('wave_'+key);
        if(!el||!buf)return;
        const data=buf.getChannelData(0);
        // Downsample for display
        const samples=60;
        const step=Math.floor(data.length/samples);
        let html='';
        for(let i=0;i<samples;i++){
          let sum=0;
          for(let j=0;j<step;j++)sum+=Math.abs(data[i*step+j]);
          const h=Math.min(100,(sum/step)*200);
          html+='<div style="display:inline-block;width:2px;height:'+Math.max(1,h)+'%;background:var(--acc);vertical-align:middle;margin:0 .3px"></div>';
        }
        el.innerHTML='<div style="display:flex;align-items:flex-end;height:100%;padding:0 2px;gap:0">'+html+'</div>';
      }

      // ========== SAMPLER CONTROLS ==========
      function reversePad(trk,snd){
        const key=trk+'_'+snd;
        FR.padState[key].reversed=!FR.padState[key].reversed;
        updateStatus((FR.padState[key].reversed?'✓':'○')+' Reversed '+snd);
        // Quick preview
        playSound(trk,snd);
      }

      function pitchPad(trk,snd,dir){
        const key=trk+'_'+snd;
        const ps=FR.padState[key];
        ps.pitch=(ps.pitch||1)+dir*.1;
        ps.pitch=Math.max(.25,Math.min(4,ps.pitch));
        updateStatus('Pitch: '+ps.pitch.toFixed(2)+'x');
        playSound(trk,snd);
      }

      // ========== GENERATED SOUNDS ==========
      function genSound(trk,snd){
        if(FR.tracks[trk].bufs[snd])return;// already generated
        const ctx=FR.ctx,sr=ctx.sampleRate;
        let buf,dur,gen;

        if(trk==='echoes'&&snd==='noise'){
          dur=2;buf=ctx.createBuffer(1,sr*dur,sr);
          gen=d=>{for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.25};
        }else if(trk==='birps'){
          const gens={
            static:{dur:.5,gen:d=>{for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(sr*.08))*.38}},
            glitch:{dur:.25,gen:d=>{const sg=Math.floor(d.length/6);for(let i=0;i<d.length;i++){const s=i/sg;d[i]=Math.sin(i*.12*(s+1)*(s%2?-1:1))*.35*(Math.random()>.08?1:0)}}},
            radio:{dur:1.2,gen:d=>{for(let i=0;i<d.length;i++){const c=Math.sin(i*.04)*.14;const n=(Math.random()*2-1)*.08;const m=Math.sin(i*.0008)>0?1:.05;d[i]=(c+n)*m}},
            vinyl:{dur:1.8,gen:d=>{for(let i=0;i<d.length;i++){const r=Math.sin(i*.004)*.05;const ck=Math.random()>.996?(Math.random()*2-1)*.22:0;const h=(Math.random()*2-1)*.018;d[i]=r+ck+h}}
          };
          const g=gens[snd];if(!g)return;
          dur=g.dur;buf=ctx.createBuffer(1,sr*dur,sr);gen=g.gen;
        }

        if(!buf)return;
        const data=buf.getChannelData(0);
        gen(data);
        FR.tracks[trk].bufs[snd]=buf;
      }

      function genAndPlayBirp(snd){
        genSound('birps',snd);
        setTimeout(()=>{
          if(FR.tracks.birps.bufs[snd])playBufferSimple(FR.tracks.birps.bufs[snd],FR.tracks.birps.gainNode);
        },50);
      }

      // Called from pad click for birp/gen pads
      // We intercept in hitPad above via the gen flag

      // ========== SYNTH ARPS ==========
      const arpPat={minor:[0,3,7,10,12,10,7,3],major:[0,4,7,11,12,11,7,4],penta:[0,3,5,7,10,12,10,7,5,3],blues:[0,3,5,6,7,10,12,10,7,6,5,3]};
      const arpBase={minor:130.81,major:146.83,penta:110,blues:116.54};

      function playArp(mode){
        if(!FR||!FR.ctx)initEngine();
        const pat=arpPat[mode],base=arpBase[mode];
        const osc=FR.tracks.synth.osc,gain=FR.tracks.synth.oscGain;
        const now=FR.ctx.currentTime;
        osc.type=FR.tracks.synth.waveType||'triangle';

        pat.forEach((semi,i)=>{
          const freq=base*Math.pow(2,semi/12),t=now+i*.05;
          osc.frequency.setValueAtMode(freq,t,'exponential');
          gain.gain.cancelScheduledValues(t);
          gain.gain.setValueAtMode(0,t,'exponential');
          gain.gain.linearRampToValueAtMode(.1,t+.012,'exponential');
          gain.gain.exponentialRampToValueAtMode(.001,t+.09,'exponential');
        });

        if(!FR.hasContent.synth){
          FR.hasContent.synth=true;
          const dot=document.getElementById('dot_synth');
          if(dot){dot.className='trk-dot met';dot.style.color='var(--acc)'}
          checkReady();
        }
      }

      // ========== REAL FX ==========
      function toggleFXPanel(trk){
        const panel=document.getElementById('fxPanel_'+trk);
        panel.style.display=panel.style.display==='none'?'block':'none';
      }

      function toggleFXOn(trk){
        const tog=document.getElementById('fxOn_'+trk);
        tog.classList.toggle('on');
        // Create/destroy real FX nodes
        if(tog.classList.contains('on')){
          createRealFX(trk);
        }else{
          destroyRealFX(trk);
        }
      }

      function createRealFX(trk){
        const ctx=FR.ctx;
        const t=FR.tracks[trk];
        t.fxChain=[];

        if(trk==='drums'){
          // LoFi filter
          const lofi=ctx.createBiquadFilter();
          lofi.type='lowpass';
          lofi.frequency.value=3000;
          lofi.Q=.8;
          t.fxChain.push(lofi);

          // Bitcrush (simplified via gain reduction + downsample simulation)
          const crush=ctx.createGain();
          crush.gain.value=.7;
          t.fxChain.push(crush);

        }else if(trk==='echoes'){
          // Delay
          const delay=ctx.delay(.28);
          delay.feedback.value=.35;
          const fb=ctx.createGain();
          fb.gain.value=.5;
          t.fxChain.push(delay);
          t.fxChain.push(fb);

        }else if(trk==='birps'){
          // Bitcrush via waveshaper (simplified)
          const crush=ctx.createWaveShaper();
          const curve=new Float32Array(256);
          for(let i=0;i<256;i++){const x=i*2/255-1;curve[i]=Math.sign(x)*Math.pow(Math.abs(x),.6)}
          crush.curve=curve;
          t.fxChain.push(crush);

        }else if(trk==='synth'){
          // Filter
          const filt=ctx.createBiquadFilter();
          filt.type='lowpass';
          filt.frequency.value=800;
          filt.Q=1.5;
          t.fxChain.push(filt);
          t.filter=filt;
        }
      }

      function destroyRealFX(trk){
        FR.tracks[trk].fxChain=[];
      }

      function applyRealFX(trk,fxName,val){
        const v=parseInt(val);
        const el=document.getElementById('fxv_'+trk+'_'+fxName);
        if(el)el.textContent=fxName==='pan'?(v>0?'R'+v:v<0?'L'+Math.abs(v):'C'):v;

        // Apply to actual node if exists
        const chain=FR.tracks[trk]?.fxChain;
        if(!chain||chain.length===0)return;

        const node=chain.find(n=>{
          if(fxName==='crunch'||fxName==='lofi')return n instanceof BiquadFilterNode;
          if(fxName==='delay'||fxName==='decay')return n instanceof DelayNode;
          if(fxName==='bitcrush')return n instanceof WaveShaperNode;
          if(fxName==='cut'||fxName==='reso')return n instanceof BiquadFilterNode;
          if(fxName==='rate')return n instanceof BiquadFilterNode;
          if(fxName==='pan')return n instanceof StereoPannerNode;
          return false;
        });

        if(node){
          if(node instanceof BiquadFilterNode){
            if(fxName==='lofi'||fxName==='cut')node.frequency.value=500+v*80;
            if(fxName==='crunch'||fxName==='reso')node.Q=.5+v*.15;
          }
          if(node instanceof DelayNode){
            if(fxName==='delay')node.delayTime.value=.05+v*.0025;
            if(fxName==='decay'&&chain[1])chain[1].gain.value=v*.008;
          }
          if(node instanceof StereoPannerNode)node.pan.value=v/100;
          if(node instanceof WaveShaperNode){// bitcrush intensity shown via curve would need rebuild
          }
        }
      }

      // ========== MIXER ==========
      function setMixVol(trk,v){
        FR.mixVol[trk]=v/100;
        if(FR.tracks[trk].gainNode)FR.tracks[trk].gainNode.gain.value=FR.mixVol[trk]*(FR.mixMute[trk]?0:1);
      }
      function setMixPan(trk,v){
        FR.mixPan[trk]=v/100;
        if(FR.tracks[trk].panNode)FR.tracks[trk].panNode.pan.value=FR.mixPan[trk];
      }
      function toggleSoloMix(trk){
        FR.mixSolo[trk]=!FR.mixSolo[trk];
        const btn=document.getElementById('soloMix_'+trk);
        btn.classList.toggle('solo-on',FR.mixSolo[trk]);
        applySoloLogic();
      }
      function toggleMuteMix(trk){
        FR.mixMute[trk]=!FR.mixMute[trk];
        const btn=document.getElementById('muteMix_'+trk);
        btn.classList.toggle('on',FR.mixMute[trk]);
        if(FR.tracks[trk].gainNode)FR.tracks[trk].gainNode.gain.value=FR.mixMute[trk]?0:FR.mixVol[trk];
      }
      function applySoloLogic(){
        const anySolo=Object.values(FR.mixSolo).some(v=>v);
        TRACK_DEFS.forEach(t=>{
          const gn=FR.tracks[t.id].gainNode;
          if(!gn)return;
          if(anySolo){
            gn.gain.value=FR.mixSolo[t.id]?FR.mixVol[t.id]*(FR.mixMute[t.id]?0:1):0;
          }else{
            gn.gain.value=FR.mixVol[t.id]*(FR.mixMute[t.id]?0:1);
          }
        });
      }

      // MUTE from track header (syncs with mixer)
      function toggleMute(trk){
        toggleMuteMix(trk);
        const btn=document.getElementById('mute_'+trk);
        if(btn)btn.classList.toggle('on',FR.mixMute[trk]);
      }
      function toggleSolo(trk){
        toggleSoloMix(trk);
        const btn=document.getElementById('solo_'+trk);
        if(btn)btn.classList.toggle('solo-on',FR.mixSolo[trk]);
      }

      // ========== TRANSPORT ==========
      function togglePlay(){
        if(FR.isPlaying)stopPlayback();else startPlayback();
      }

      function checkReady(){
        const all=FR.hasContent.drums&&FR.hasContent.echoes&&FR.hasContent.birps&&FR.hasContent.synth;
        const sb=document.getElementById('statusBar');
        const dots=['reqDrums','reqEchoes','reqBirps','reqSynth'];
        dots.forEach((d,i)=>{const el=document.getElementById(d);const met=[FR.hasContent.drums,FR.hasContent.echoes,FR.hasContent.birps,FR.hasContent.synth][i];el.className='req-dot '+(met?'met':'unmet')});
        if(all){
          sb.className='status-bar ready';
          sb.querySelector('#statusText').textContent='✓ READY TO PLAY — all 4 tracks loaded';
        }else{
          sb.className='status-bar missing';
          const miss=[];
          if(!FR.hasContent.drums)miss.push('DRUMS');
          if(!FR.hasContent.echoes)miss.push('ECHOES');
          if(!FR.hasContent.birps)miss.push('BIRPS');
          if(!FR.hasContent.synth)miss.push('SYNTH');
          sb.querySelector('#statusText').textContent='Need: '+miss.join(' + ');
        }
      }

      function startPlayback(){
        const miss=[];
        if(!FR.hasContent.drums)miss.push('drums');
        if(!FR.hasContent.echoes)miss.push('echoes');
        if(!FR.hasContent.birps)miss.push('birps');
        if(!FR.hasContent.synth)miss.push('synth');
        if(miss.length>0){updateStatus('Missing: '+miss.join(', '));return}

        FR.isPlaying=true;
        FR.currentStep=0;
        document.getElementById('playBtn').classList.add('playing');
        document.getElementById('transBtn')?.classList.add('playing');

        const st=60000/FR.tempo/4;

        FR.intervalId=setInterval(()=>{
          const idx=FR.currentStep%FR.stepCount;

          // Visual
          document.querySelectorAll('#seqGrid .seq-step').forEach((s,i)=>s.classList.toggle('now',i===idx));

          const item=FR.sequence[idx];
          if(item){
            // Probability check
            if(item.prob!==undefined&&Math.random()*100>item.prob){
              FR.currentStep++;
              return;
            }

            // Swing
            const swingD=(idx%2===1)?(FR.swing-50)/100*st:0;

            const trk=item.trk,snd=item.snd;

            if(swingD>0){
              setTimeout(()=>{playSound(trk,snd);flashMeter(trk)},swingDx);
            }else{
              playSound(trk,snd);flashMeter(trk);
            }

            // Flash pad
            const pad=document.querySelector('[data-trk="'+trk+'"][data-snd="'+snd+'"]');
            if(pad){pad.classList.add('hit');setTimeout(()=>pad.classList.remove('hit'),80)}
          }

          FR.currentStep++;
        },st);

        updateStatus('▶ PLAYING '+FR.tempo+' BPM swing '+FR.swing+'%');
        log('ok','Beat started');
      }

      function flashMeter(trk){
        const m=document.getElementById('mix_'+trk);
        if(m){m.style.height='65%';setTimeout(()=>m.style.height='12%',120)}
      }

      function stopPlayback(){
        FR.isPlaying=false;
        if(FR.intervalId){clearInterval(FR.intervalId);FR.intervalId=null}
        document.getElementById('playBtn')?.classList.remove('playing');
        document.getElementById('transBtn')?.classList.remove('playing');
        document.querySelectorAll('#seqGrid .seq-step').forEach(s=>s.classList.remove('now'));
        updateStatus('Stopped');
      }

      function clearPattern(){
        FR.sequence.fill(null);
        refreshSeqDisplay();
        updateStatus('Pattern cleared');
      }

      // ========== RECORDING ==========
      function startRecording(){
        if(FR.recording){
          // Stop recording
          FR.recording=false;
          document.getElementById('recBtn').classList.remove('warn');
          document.getElementById('recBtn').textContent='● REC';
          updateStatus('Recorded '+FR.recordedSteps.length+' steps');
          return;
        }

        FR.recording=true;
        FR.recordedSteps=[];
        FR.recStartTime=Date.now();
        document.getElementById('recBtn').classList.add('warn');
        document.getElementById('recBtn').textContent='■ STOP';
        updateStatus('RECORDING... tap pads to capture');

        // Auto-advance step every beat
        const st=60000/FR.tempo/4;
        FR._recInterval=setInterval(()=>{
          if(!FR.recording){clearInterval(FR._recInterval);return}
          const idx=FR.currentStep%FR.stepCount;
          document.querySelectorAll('#seqGrid .seq-step').forEach((s,i)=>s.classList.toggle('now',i===idx));
          FR.currentStep++;
        },st);

        // Listen for pad hits during recording
        FR._recHitHandler=(ev)=>{
          if(!FR.recording)return;
          const trk=ev.currentTarget.dataset.trk;
          const snd=ev.currentTarget.dataset.snd;
          const idx=(FR.currentStep-1)%FR.stepCount;
          // Don't duplicate if same step already has this exact pad
          const exists=FR.recordedSteps.find(r=>r.idx===idx&&r.trk===trk&&r.snd===snd);
          if(!exists){
            FR.recordedSteps.push({idx,trk,snd});
            FR.sequence[idx]={trk,snd,len:50,prob:100};
            refreshSeqDisplay();
          }
          playSound(trk,snd);
        };
        document.querySelectorAll('.pad').forEach(p=>p.addEventListener('mousedown',FR._recHitHandler));
      }

      // ========== BOUNCE (simulated) ==========
      function bounceRender(){
        if(!FR.hasContent.drums||!FR.hasContent.echoes||!FR.hasContent.birps||!FR.hasContent.synth){
          updateStatus('Load all 4 tracks first');return;
        }
        updateStatus('🎧 Bouncing... (simulated render)');
        log('ok','Bounce initiated — playing through master output');
        // In production: OfflineAudioContext would render to WAV
        setTimeout(()=>updateStatus('✓ Bounce complete — output sent to master'),2000);
      }

      // ========== STATUS ==========
      function updateStatus(msg){
        const el=document.getElementById('statusText');
        if(el)el.textContent=msg;
      }

      // ========== INIT ENGINE ==========
      function initEngine(){
        if(FR&&FR.ctx)return;
        initAudio();
        const ctx=S.acx;
        FR.ctx=ctx;

        // Master
        FR.masterGain=ctx.createGain();
        FR.masterGain.gain.value=FR.masterVol;

        // Limiter (simple compressor)
        FR.compNode=ctx.createDynamicsCompressor();
        FR.compNode.threshold.value=-18;
        FR.compNode.knee.value=20;
        FR.compNode.ratio.value=4;
        FR.compNode.attack.value=.003;
        FR.compNode.release=.1;

        // Analyser
        FR.analyser=ctx.createAnalyser();
        FR.analyser.fftSize=256;

        // Create track nodes
        TRACK_DEFS.forEach(t=>{
          const tr=FR.tracks[t.id];
          tr.gainNode=ctx.createGain();
          tr.gainNode.gain.value=FR.mixVol[t.id]||.65;
          tr.panNode=ctx.createStereoPanner();
          tr.panNode.pan.value=FR.mixPan[t.id]||0;

          if(t.id==='synth'){
            tr.osc=ctx.createOscillator();
            tr.osc.type='triangle';
            tr.osc.frequency.value=220;
            tr.oscGain=ctx.createGain();
            tr.oscGain.gain=0;
            tr.osc.connect(tr.oscGain);
            if(tr.filter){tr.oscGain.connect(tr.filter);tr.filter.connect(tr.gainNode)}else{tr.oscGain.connect(tr.gainNode)}
            tr.osc.start();
          }

          tr.gainNode.connect(tr.panNode);
          tr.panNode.connect(FR.masterGain);
        });

        FR.masterGain.connect(FR.compNode);
        FR.compNode.connect(FR.analyser);
        FR.analyser.connect(ctx.destination);

        // Also connect masterGain directly so we hear something
        // (analyser is for VU only)
        FR.masterGain.connect(ctx.destination);

        animVU();
        log('ok','Audio engine v3 online');
        updateStatus('Engine ready — load sounds into all 4 tracks');
      }

      // ========== VU METER ==========
      function animVU(){
        if(!FR||!FR.analyser){requestAnimationFrame(animVU);return}
        const d=new Uint8Array(FR.analyser.frequencyBinCount);
        FR.analyser.getByteFrequencyData(d);
        let sum=0;
        for(let i=0;i<d.length;i++)
          sum+=d[i];
        const h=Math.min(100,sum/d.length/2.55);
        document.getElementById('vuL').style.height=h+'%';
        document.getElementById('vuR').style.height=Math.min(100,h*(.88+Math.random()*.15))+'%';
        requestAnimationFrame(animVU);
      }

      // ========== BOOT ==========
      function boot(){
        resizeP();mkParts();drawP();
        buildUI();
        setInterval(tick,1000);
        log('ok','Field Recorder v3 loaded');
        log('info','Upgraded: sampler+real FX+patterns+mixer');
        window.addEventListener('resize',()=>{resizeP();mkParts()});
        document.addEventListener('keydown',e=>{if(e.key==='Escape')stopPlayback()});
      }
      boot();
    </script>
  </body>
</html>
