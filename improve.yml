version: 1
updated: 2026-05-12
scope: artifacts/app-hub-v11-clean-messaging-ui
status: in_progress

fixed:

  - id: observer-semantic-minesweeper-state
    area: app-hub-v11/observer
    severity: medium
    summary: Generic observer snapshots only carried DOM HTML, so future consumers could not use compact app-specific state.
    cause: The artifact observer bridge did not accept semantic snapshot hooks, and Minesweeper had no compact board/HUD state export.
    fix: Add getSemanticSnapshot support to the generic observer bridge and publish Minesweeper semantic state including board dimensions, mine/flag/reveal counts, elapsed/status, focus, and compact cell state.
    tests:
      - tests/non-peer-observer-bridge.test.mjs

  - id: observer-stale-snapshot-warning
    area: app-hub-v11/observer
    severity: medium
    summary: Observer status showed snapshot age but did not warn when the observed app stopped sending updates.
    cause: The hub rendered observer age only on snapshot receipt and had no stale threshold or refresh timer.
    fix: Add OBSERVER_STALE_AFTER_MS, refresh observer status every second, mark stale snapshots with observer-stale styling, and clean up the timer on unload.
    tests:
      - tests/non-peer-observer-bridge.test.mjs

  - id: observer-snapshot-status-metadata
    area: app-hub-v11/observer
    severity: medium
    summary: Generic observer snapshots lacked visible freshness/source metadata for users watching remote or local artifact sessions.
    cause: The initial observer bridge relayed DOM snapshots but did not sequence snapshots or expose last-snapshot status in observer frames and the hub lobby.
    fix: Add sequence numbers, snapshot age metadata, observer-frame status badge updates, and a hub Lobby / Chat observer status panel showing source, sequence, and last snapshot age.
    tests:
      - tests/non-peer-observer-bridge.test.mjs
      - tests/app-hub-v11-index-ui.test.mjs

  - id: generic-non-peer-observer-bridge
    area: app-hub-v11/observer
    severity: high
    summary: Non-Peernet artifacts such as Solitaire, Minesweeper, and Sprite GIF Creator could not be observed through the hub presence menu.
    cause: Existing observe/join support assumed app-specific peer integration and did not provide a generic snapshot relay for simple standalone artifacts.
    fix: Add a generic artifact observer bridge, opt Minesweeper/Solitaire/Sprite GIF Creator into read-only snapshot publishing, relay iframe snapshots through the hub network, and forward peer/local snapshots into observer iframes.
    limitations:
      - First implementation mirrors DOM snapshots and disables controls in observer windows.
      - Semantic per-game replay/state-diff protocols remain future work.
    tests:
      - tests/non-peer-observer-bridge.test.mjs
      - tests/app-hub-v11-index-ui.test.mjs

  - id: bridge-static-app-hub-v11-command
    area: bridge/static-analysis
    severity: medium
    summary: Repeated v11 static checks were ad-hoc shell snippets instead of a reusable bridge command.
    cause: bridge.yml had compile/smoke commands but no focused static verification command covering HTML module extraction, JS syntax checks, and root-safe UI contracts.
    fix: Add static:app-hub-v11 bridge command, add scripts/extract-html-module.mjs for robust module extraction, and add bridge command contract coverage.
    tests:
      - tests/bridge-commands.test.mjs
      - static:app-hub-v11 command steps run in focused chunks

  - id: hub-bottom-lobby-chat-tab
    area: app-hub-v11/runtime-ui
    severity: high
    summary: Lobby/chat was cramped in the sidebar and not available as a distinct bottom-pane tab next to Event Log.
    cause: The original lobby panel combined roster, channels, join status, and chat inside the left sidebar.
    fix: Keep a compact lobby summary in the sidebar, add a dedicated Lobby / Chat permanent bottom-pane tab next to Event Log, move detailed roster/channel/chat controls into that tab, and enlarge the chat log.
    tests:
      - tests/app-hub-v11-index-ui.test.mjs
      - tests/app-hub-v11-links-settings.test.mjs

  - id: hub-chat-peer-acknowledgements
    area: app-hub-v11/messaging
    severity: medium
    summary: Chat delivery only had local sent labels and no peer acknowledgement/failure feedback.
    cause: The hub sent chat messages without an explicit acknowledgement protocol or timeout path.
    fix: Add chat-ack packets keyed by message id, mark matching local messages acked, show pending when peers are connected, keep local-only sends as sent, and fail pending sends after timeout.
    tests:
      - tests/app-hub-v11-index-ui.test.mjs

  - id: hub-floating-inline-toggle
    area: app-hub-v11/runtime-ui
    severity: high
    summary: Running apps could be launched inline or floating, but could not toggle between those container states.
    cause: Inline deck and floating panels were separate one-way launch paths with no shared iframe/node transfer or dock controls.
    fix: Add float controls to inline app tabs, dock controls to floating panels, preserve iframe nodes during inline/floating transfers, and keep runtimeRegistry containerMode in sync for direct and toggled floating apps.
    tests:
      - tests/app-hub-v11-index-ui.test.mjs
      - tests/app-hub-v11-libs.test.mjs

  - id: launcher-runtime-registry
    area: app-hub-v11/lib/launcher
    severity: high
    summary: Floating/inline state transfer needed a tested runtime descriptor registry before UI controls could safely move live apps.
    cause: Running app instances were implicit DOM nodes in the inline deck or floating panel, with no stable runtimeInstanceId or container-mode descriptor.
    fix: Add createAppRuntimeRegistry with stable instance ids, artifact/launch metadata, containerMode tracking, live node attachment, move/remove operations, and explicit unknown-instance errors.
    tests:
      - tests/app-hub-v11-libs.test.mjs

  - id: hub-single-level-inline-tabs
    area: app-hub-v11/runtime-ui
    severity: high
    summary: Inline apps used a nested second-level tab strip separate from the Event Log workspace tab.
    cause: The workspace had wrapper tabs for inline tabs/event log and then a separate appDeckTabs row for running apps.
    fix: Remove nested appDeckTabs, make Event Log the permanent first tab in workspaceTabs, append inline app tabs into the same tab strip, and return to Event Log when the last app closes.
    tests:
      - tests/app-hub-v11-index-ui.test.mjs
      - tests/app-hub-v11-libs.test.mjs

  - id: hub-catalog-modified-default-actions
    area: app-hub-v11/catalog-ui
    severity: high
    summary: Artifacts needed manifest-backed recently-modified ordering and per-artifact default launch actions.
    cause: Sorting was only client-side/fallback and title clicks used a global default action instead of artifact metadata.
    fix: Compiler sorts catalog items by modified metadata, normalizes launch.defaultAction, source manifest declares defaults, and title clicks use artifact launch.defaultAction with global fallback.
    tests:
      - tests/app-hub-v11-catalog.test.mjs
      - tests/app-hub-v11-index-ui.test.mjs
  - id: hub-legacy-v8-native-scratchpad
    area: app-hub-v11/legacy-utilities
    severity: medium
    summary: v8 had only external editor links, not a native local-first notes/editor utility.
    cause: Legacy utilities covered v4/v9/v10 native text surfaces but v8 only linked out to collaborative editors.
    fix: Add v8 Native Scratchpad to legacy tool module and v11 artifact catalog.
    tests:
      - tests/app-hub-v11-legacy-tools.test.mjs
      - tests/app-hub-v11-catalog.test.mjs
  - id: ui-lib-floating-move-resize
    area: app-hub-v11/lib/launcher
    severity: high
    summary: Floating panels were fixed overlays that could not be moved or resized.
    cause: createFloatingPanel produced a static single floating section with no pointer handling or resize styling.
    fix: Add drag handle, pointer-based movement, browser resize styling, and resize affordance markup.
    tests:
      - tests/app-hub-v11-libs.test.mjs

  - id: hub-chat-unread-delivery
    area: app-hub-v11/messaging
    severity: medium
    summary: Lobby/personal chat had no unread indicators or local delivery state.
    cause: Chat rendering stored only raw messages and selected channel, so background-channel activity and send progress were invisible.
    fix: Persist per-channel unread counts, clear counts on channel selection, render unread badges and accessible labels, and show sending/sent delivery labels for local messages.
    tests:
      - tests/app-hub-v11-index-ui.test.mjs
  - id: hub-v11-deploy-safe-module-paths
    area: app-hub-v11/base-ui
    severity: high
    summary: Base hub regressed from deploy-safe dynamic module URLs to static ./lib imports, breaking root-promoted and nested deployment assumptions.
    cause: app-hub-v11/index.html directly imported ./lib modules instead of resolving through HUB_BASE/hubUrl.
    fix: Restore HUB_BASE/hubUrl dynamic imports for menu, launcher, event-log, resizable panels, storage, themes, sound, network, and profile modules.
    tests:
      - tests/app-hub-v11-root-safe-imports.test.mjs
      - tests/app-hub-v11-index-ui.test.mjs
  - id: hub-v11-shared-shell-css-contract
    area: app-hub-v11/base-ui
    severity: medium
    summary: Static sweep exposed contradictory stylesheet path expectations between root-safe import and shared-shell tests.
    cause: The hub is currently served from app-hub-v11/index.html, so the correct shared shell path is lib/v9-shell.css; app-hub-v11/lib/v9-shell.css would double-prefix when nested.
    fix: Keep the hub stylesheet link local and update the root-safe test to assert against non-double-prefixed stylesheet loading.
    tests:
      - tests/app-hub-v11-root-safe-imports.test.mjs
      - tests/app-hub-v11-shared-v9-shell-css.test.mjs
  - id: artifacts-agent-browser-bridge
    area: root/bridge-devtools
    severity: medium
    summary: Bridge lacked direct agent-browser workflows for local artifact browser inspection.
    cause: Existing serve/open commands were Firefox-oriented and did not expose agent-browser session/tab operations.
    fix: Add artifacts-browse helper and bridge commands for browser start, stop, open, tab list, session list, and raw pass-through via AGENT_BROWSER_ARGS.
    tests:
      - bash -n artifacts-browse
      - ./artifacts-browse list
      - ./artifacts-browse session list
      - bridge command discovery
  - id: hub-ui-workspace-default-log
    area: app-hub-v11/ui
    severity: high
    summary: Event log tab was not selected by default and inline app pane spawned too small.
    cause: Hub implementation defaulted workspace to appDeck with 40vh height and 0-min-height iframes.
    fix: Default workspace tab/panel to event log, increase workspace default height, enforce larger inline iframe minimum height.
    tests:
      - tests/app-hub-v11-index-ui.test.mjs
  - id: hub-presence-menu-actions
    area: app-hub-v11/messaging
    severity: high
    summary: User context menu could not spawn personal chats or join/observe games.
    cause: Presence menu only exposed copy/alias/status actions in the hub implementation.
    fix: Add personal chat channel spawning, join game, observe game, and copy peer id actions.
    tests:
      - tests/app-hub-v11-index-ui.test.mjs
  - id: launch-url-peer-actions
    area: app-hub-v11/lib/launcher
    severity: high
    summary: Inline/floating launches did not encode peer target, spectate/observe, mode, or session params.
    cause: Launcher only added embedded=true and multiplayer=true.
    fix: Encode targetPeerId, spectate/observe, mode, and session for inline/floating/fullscreen app starts.
    tests:
      - tests/app-hub-v11-libs.test.mjs
  - id: shooter-join-observe
    area: app-hub/shooter
    severity: high
    summary: Space shooter could not distinguish stage/vs/session joins or observe mode from hub URLs.
    cause: Shooter read only username/embedded/multiplayer and always broadcasted playable state.
    fix: Centralize URL params, consume targetPeerId/mode/spectate/observe, send join requests, and suppress state loops while observing.
    tests:
      - tests/shooter-multiplayer-smoke.mjs
      - tests/shooter-impl-smoke.mjs
  - id: daw-join-observe
    area: v11-peer-daw
    severity: high
    summary: v11 DAW did not auto-join peer sessions launched from the hub.
    cause: DAW connect flow ignored targetPeerId/session/spectate URL params.
    fix: Read launch URL params, auto-start peer connection when params are present, and pass params into PeernetStack start.
    tests:
      - tests/v11-peer-daw-build-imports.test.mjs
  - id: palette-scale-duplicate
    area: app-hub-v11/ui
    severity: medium
    summary: Palette derivation script redeclared scale in the same scope.
    cause: Duplicate const scale line in derivePaletteFromImage.
    fix: Remove duplicate declaration and test for a single scale definition.
    tests:
      - tests/app-hub-v11-index-ui.test.mjs

classified:
  - area: peernet
    finding: Shared Peernet transport can carry peer/session packets; missing behavior was primarily in hub/app implementation glue.
  - area: storage
    finding: Storage was not root cause; selected chat channel persistence was missing in hub implementation and now uses existing hub storage helpers.
  - area: ui
    finding: Shared launcher needed URL parameter support; v11 hub UI needed default workspace/menu action rework.

open:
  - id: observe-gamestate-spec
    area: future/spec
    priority: high
    summary: Full observer protocol should formalize read-only gamestate views per app.
    notes:
      - observer launches must set spectate=true and observe=true
      - observed apps should never mutate host state
      - generic DOM snapshot bridge is implemented for non-Peernet standalone apps
      - Minesweeper now publishes compact semantic observer snapshots
      - future host apps should reply to join/request-state messages with compact semantic snapshots
      - UI exposes observed peer/source, last snapshot age, sequence, and stale snapshot warnings
      - future UI should add explicit disconnect reason when the transport reports peer disconnect
  - id: full-messaging-system
    area: future/messaging
    priority: high
    summary: Build a clean full-fledged messaging system beyond current lobby/personal channels.
    notes:
      - typed channels: lobby, dm, game, system
      - unread counts and selected channel persistence (partially implemented for hub chat)
      - message delivery ack/failure display (local sending/sent labels implemented; peer acknowledgements remain open)
      - peer identity aliases backed by profile storage
  - id: app-side-observe-depth
    area: future/apps
    priority: medium
    summary: Bomberman has target-peer joins; shooter and DAW now consume hub params, but deeper read-only state replay needs real browser/integration coverage.
  - id: browser-harness
    area: future/tests
    priority: medium
    summary: Add headless browser tests for actual context menu clicks, iframe sizing, and multi-peer message routing.

  - id: inline-floating-state-toggle-spec
    area: future/spec
    priority: high
    summary: Allow running programs to toggle between inline tab state and floating panel state.
    behavior:
      - each running app instance receives a stable runtimeInstanceId separate from artifact id
      - inline and floating containers are views over the same runtime descriptor when browser security permits
      - iframe-backed apps should move DOM nodes between containers instead of reloading when same-document ownership permits
      - cross-origin/new-window apps fall back to relaunch with preserved launch URL and visible warning
      - toggling from floating to inline creates or selects one app tab in the single inline tab strip
      - toggling from inline to floating closes/hides the tab view and places the same iframe in a movable/resizable panel
    affected_files:
      - app-hub-v11/lib/launcher.js
      - app-hub-v11/index.html
      - tests/app-hub-v11-libs.test.mjs
      - tests/app-hub-v11-index-ui.test.mjs
    test_cases:
      - open inline app, toggle floating, iframe src and instance id are preserved
      - open floating app, toggle inline, exactly one tab appears and is selected
      - close toggled app cleans both tab and floating metadata
      - unsupported cross-origin toggle logs fallback and relaunches safely
    implementation_approach:
      - introduce AppRuntimeRegistry with descriptors: instanceId, artifact, launch, containerMode, iframeNode, tabNode, panelNode
      - refactor createInlineTabDeck and createFloatingPanel around registry operations
      - add toolbar controls: float, dock inline, close
      - persist optional last containerMode per artifact only after runtime registry is stable
    follow_up_tasks:
      - browser harness for drag/dock behavior
      - accessibility labels and keyboard shortcuts for dock/float controls
      - failure telemetry in event log
  - id: single-level-inline-tabs-spec
    area: completed/ui
    priority: high
    summary: Collapse workspace and app tabs into one inline tab strip with Event Log as the first tab.
    behavior:
      - Event Log is tab 0 in the same strip as running apps
      - no separate workspace tab bar above app tabs
      - opening an inline app appends/selects one tab in this unified strip
      - closing app tabs never closes Event Log
      - empty runtime state still shows Event Log selected by default
    affected_files:
      - app-hub-v11/index.html
      - app-hub-v11/lib/launcher.js
      - tests/app-hub-v11-index-ui.test.mjs
      - tests/app-hub-v11-libs.test.mjs
    test_cases:
      - initial hub renders one active Event Log tab
      - opening an app yields Event Log + app tab only, no nested tab bar
      - closing the last app returns selection to Event Log
      - event log clear button remains available inside the Event Log tab panel
    implementation_approach:
      - replace workspaceTabs/appDeckTabs split with a single runtimeTabs node (done)
      - keep Event Log as the permanent first tab while app panels remain managed by createInlineTabDeck (done)
      - select app tabs from createInlineTabDeck onChange and return to Event Log on empty (done)
      - future: move eventLogPanel into a full AppRuntimeRegistry when inline/floating transfer lands
