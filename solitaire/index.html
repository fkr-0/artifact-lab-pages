<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Classic Solitaire</title>
<style>
:root{--felt:#0f6b45;--felt2:#0a4f35;--line:rgba(255,255,255,.24);--card:#fffdf4;--red:#bd1e2d;--black:#151515;--gold:#ffd166;--shadow:rgba(0,0,0,.32);--w:88px;--h:124px}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:radial-gradient(circle at 20% 10%,rgba(255,255,255,.13),transparent 22rem),linear-gradient(135deg,var(--felt),var(--felt2));color:#fff;font:14px/1.4 system-ui,Segoe UI,Tahoma,sans-serif;padding:18px}.app{max-width:1120px;margin:0 auto}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}.title{display:grid;gap:2px}.title h1{margin:0;font-size:1.35rem;letter-spacing:.08em;text-transform:uppercase}.title span,.hint{opacity:.78}.hud,.controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.pill{border:1px solid var(--line);border-radius:999px;padding:.35rem .65rem;background:rgba(0,0,0,.18)}button,select{font:inherit;border:1px solid rgba(255,255,255,.28);border-radius:9px;background:rgba(255,255,255,.12);color:#fff;padding:.45rem .62rem;cursor:pointer}button:hover{background:rgba(255,255,255,.2)}select option{color:#111}.board{display:grid;gap:18px}.row{display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap}.zone{width:var(--w);height:var(--h);border:2px dashed rgba(255,255,255,.28);border-radius:12px;display:grid;place-items:center;color:rgba(255,255,255,.42);font-weight:800;box-shadow:inset 0 0 24px rgba(0,0,0,.12)}.zone.hot{outline:3px solid rgba(255,209,102,.75);outline-offset:2px}.spacer{flex:1;min-width:24px}.tableau{display:grid;grid-template-columns:repeat(7,var(--w));gap:14px;align-items:start;overflow-x:auto;padding-bottom:20px}.col{min-height:var(--h);border-radius:12px;position:relative}.card{width:var(--w);height:var(--h);border-radius:10px;border:1px solid rgba(0,0,0,.3);background:var(--card);color:var(--black);box-shadow:0 5px 12px var(--shadow);padding:7px;display:grid;grid-template-rows:auto 1fr auto;user-select:none;cursor:pointer;position:relative}.card.red{color:var(--red)}.card.face-down{background:repeating-linear-gradient(45deg,#173b8a 0 8px,#1e4fb8 8px 16px);border:2px solid rgba(255,255,255,.72);color:transparent}.card.selected{outline:3px solid var(--gold);outline-offset:2px}.card[draggable="true"]{touch-action:none}.dragging{opacity:.45}.drop-ok{outline:4px solid rgba(255,209,102,.9)!important;outline-offset:3px}.drag-ghost{position:fixed;left:0;top:0;z-index:9999;pointer-events:none;filter:drop-shadow(0 18px 24px rgba(0,0,0,.45));will-change:transform;transform:translate3d(0,0,0) rotate(0deg) scale(1.04);transition:filter .18s ease}.drag-ghost.snap{transition:transform .24s cubic-bezier(.2,.9,.25,1.18),opacity .18s ease,filter .18s ease}.drag-ghost.snap-back{transition:transform .34s cubic-bezier(.22,1.35,.36,1),opacity .24s ease;opacity:.75}.drag-shadow{box-shadow:0 26px 42px rgba(0,0,0,.34)}.drag-stack{--sh:26px}.drag-stack.shadow-dyn{box-shadow:0 calc(var(--sh)*1.4) calc(var(--sh)*2.2) rgba(0,0,0,.36)}.drag-stack{position:fixed;left:0;top:0;z-index:9999;pointer-events:none;will-change:transform}.drag-stack .card{position:absolute;margin:0;overflow:hidden;transform-style:preserve-3d}.drag-stack .card::before{content:"";position:absolute;inset:0;border-radius:inherit;background:repeating-linear-gradient(0deg,rgba(0,0,0,.02) 0 2px,transparent 2px 4px);opacity:.18;pointer-events:none} .drag-stack .card::before{content:"";position:absolute;inset:0;border-radius:inherit;background:repeating-linear-gradient(0deg,rgba(0,0,0,.02) 0 2px,transparent 2px 4px);opacity:.18;pointer-events:none} .drag-stack .card::after{content:"";position:absolute;inset:0;border-radius:inherit;background:radial-gradient(circle at var(--glx,35%) var(--gly,20%),rgba(255,255,255,.42),transparent 38%),linear-gradient(115deg,rgba(255,255,255,.2),transparent 45%,rgba(0,0,0,.18));mix-blend-mode:screen;opacity:var(--glo,.32);pointer-events:none}.magnet{transform:scale(1.045);transition:transform .12s ease,outline-color .12s ease}.rank{font-weight:900;font-size:1.05rem;line-height:1}.pip{font-size:2rem;place-self:center}.foot{font-weight:900;font-size:1.05rem;place-self:end;transform:rotate(180deg)}.stack .card{margin-bottom:-92px}.stack .card.face-down{margin-bottom:-96px}.stack .card:last-child{margin-bottom:0}.waste .card,.foundation .card{grid-area:1/1}.message{min-height:34px;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.18);padding:8px 10px}.win{position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;place-items:center;padding:20px}.win.show{display:grid}.modal{max-width:420px;background:#10291f;border:1px solid rgba(255,255,255,.3);border-radius:18px;padding:22px;box-shadow:0 24px 80px rgba(0,0,0,.5);text-align:center}.modal h2{margin-top:0;color:var(--gold)}@media(max-width:760px){:root{--w:70px;--h:100px}.tableau{gap:8px}.row{gap:8px}.stack .card{margin-bottom:-75px}.stack .card.face-down{margin-bottom:-78px}.pip{font-size:1.45rem}body{padding:10px}}
</style>
</head>
<body>
<main class="app">
<header class="top">
<div class="title"><h1>Classic Solitaire</h1><span>Klondike clone · stock, waste, foundations, tableau, scoring, undo</span></div>
<div class="controls"><select id="drawMode"><option value="1">Draw 1</option><option value="3">Draw 3</option></select><button id="newBtn">New Deal</button><button id="undoBtn">Undo</button><button id="autoBtn">Auto to foundation</button></div>
<div class="hud"><span class="pill">Score <b id="score">0</b></span><span class="pill">Moves <b id="moves">0</b></span><span class="pill">Time <b id="time">00:00</b></span><span class="pill">Best <b id="best">---</b></span></div>
</header>
<section class="board" aria-label="Solitaire board">
<div class="row"><div class="zone" id="stock" title="Stock pile"></div><div class="zone waste" id="waste" title="Waste pile"></div><div class="spacer"></div><div class="zone foundation" data-foundation="S">♠</div><div class="zone foundation" data-foundation="H">♥</div><div class="zone foundation" data-foundation="D">♦</div><div class="zone foundation" data-foundation="C">♣</div></div>
<div class="tableau" id="tableau"></div>
<div class="message" id="message">Click a card to select it, then click a valid target. Double-click a card to send it to a foundation.</div>
</section>
</main>
<div class="win" id="win"><div class="modal"><h2>Victory</h2><p id="winText"></p><button id="winNew">Deal again</button></div></div>
<script>
(() => {
  'use strict';
  const suits = ['S','H','D','C'];
  const symbols = {S:'♠',H:'♥',D:'♦',C:'♣'};
  const names = {1:'A',11:'J',12:'Q',13:'K'};
  const red = s => s === 'H' || s === 'D';
  const el = id => document.getElementById(id);
  let game, timer;
  const bestKey = 'classic-solitaire.best.v1';
  function freshDeck(){const deck=[];for(const suit of suits) for(let rank=1;rank<=13;rank++) deck.push({id:`${suit}${rank}`,suit,rank,up:false});for(let i=deck.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[deck[i],deck[j]]=[deck[j],deck[i]];}return deck;}
  function newGame(){stopTimer();const deck=freshDeck();const tableau=Array.from({length:7},()=>[]);for(let col=0;col<7;col++) for(let n=0;n<=col;n++){const card=deck.pop();card.up=n===col;tableau[col].push(card);}game={stock:deck,waste:[],foundations:{S:[],H:[],D:[],C:[]},tableau,score:0,moves:0,started:Date.now(),elapsed:0,selected:null,history:[],won:false,draw:Number(el('drawMode').value)};startTimer();render('New deal. Build down alternating colors; foundations build up by suit.');}
  function snapshot(){game.history.push(JSON.stringify({stock:game.stock,waste:game.waste,foundations:game.foundations,tableau:game.tableau,score:game.score,moves:game.moves,elapsed:game.elapsed}));if(game.history.length>80) game.history.shift();}
  function undo(){const snap=game.history.pop();if(!snap) return render('Nothing to undo.');const o=JSON.parse(snap);Object.assign(game,o,{selected:null,started:Date.now()-o.elapsed*1000});render('Undo.');}
  function moveScore(kind){const points={wasteToTableau:5,tableauReveal:5,toFoundation:10,foundationToTableau:-15,recycle:-100,tableauMove:0};game.score=Math.max(0,game.score+(points[kind]??0));}
  function drawStock(){if(game.won) return;snapshot();game.selected=null;if(game.stock.length){const count=Math.min(game.draw,game.stock.length);for(let i=0;i<count;i++){const c=game.stock.pop();c.up=true;game.waste.push(c);}game.moves++;render(`Drew ${count}.`);return;}if(game.waste.length){game.stock=game.waste.reverse().map(c=>({...c,up:false}));game.waste=[];game.moves++;moveScore('recycle');render('Recycled waste to stock.');}}
  function rankName(card){return `${names[card.rank]||card.rank}${symbols[card.suit]}`;}
  function cardHtml(card, attrs=''){const cls=['card',red(card.suit)?'red':'black'];if(!card.up) cls.push('face-down');if(game.selected?.ids?.includes(card.id)) cls.push('selected');const drag = card.up ? 'draggable="true"' : '';return `<div class="${cls.join(' ')}" data-card="${card.id}" ${drag} ${attrs}>${card.up?`<div class="rank">${rankName(card)}</div><div class="pip">${symbols[card.suit]}</div><div class="foot">${rankName(card)}</div>`:''}</div>`;}
  function render(msg){el('score').textContent=game.score;el('moves').textContent=game.moves;el('time').textContent=fmt(game.elapsed);el('best').textContent=localStorage.getItem(bestKey)||'---';el('stock').innerHTML=game.stock.length?`<div class="card face-down"></div><b>${game.stock.length}</b>`:'↻';const topWaste=game.waste[game.waste.length-1];el('waste').innerHTML=topWaste?cardHtml(topWaste,'data-source="waste"'):'';for(const node of document.querySelectorAll('.foundation')){const suit=node.dataset.foundation;const top=game.foundations[suit].at(-1);node.innerHTML=top?cardHtml(top,`data-source="foundation" data-suit="${suit}"`):symbols[suit];}el('tableau').innerHTML=game.tableau.map((col,i)=>`<div class="col stack zone" data-col="${i}">${col.map((c,idx)=>cardHtml(c,`data-source="tableau" data-col="${i}" data-idx="${idx}"`)).join('')}</div>`).join('');el('message').textContent=msg||'Ready.';highlightTargets();checkWin();}
  function fmt(s){const m=Math.floor(s/60);const r=s%60;return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;}
  function startTimer(){timer=setInterval(()=>{game.elapsed=Math.floor((Date.now()-game.started)/1000);el('time').textContent=fmt(game.elapsed);},1000);}function stopTimer(){clearInterval(timer);}
  function selectFrom(target){const source=target.dataset.source;if(source==='waste'){const card=game.waste.at(-1);if(card) game.selected={source,card,ids:[card.id]};}if(source==='foundation'){const suit=target.dataset.suit;const card=game.foundations[suit].at(-1);if(card) game.selected={source,suit,card,ids:[card.id]};}if(source==='tableau'){const col=Number(target.dataset.col),idx=Number(target.dataset.idx);const card=game.tableau[col][idx];if(!card.up) return flipTableauTop(col);const stack=game.tableau[col].slice(idx);game.selected={source,col,idx,card,stack,ids:stack.map(c=>c.id)};}render(game.selected?`Selected ${rankName(game.selected.card)}.`:'Select a movable card.');}
  function flipTableauTop(col){const pile=game.tableau[col],top=pile.at(-1);if(!top||top.up) return;snapshot();top.up=true;game.moves++;moveScore('tableauReveal');render(`Revealed ${rankName(top)}.`);}
  function canTableau(card,col){const dest=game.tableau[col];if(!dest.length) return card.rank===13;const top=dest.at(-1);return top.up&&top.rank===card.rank+1&&red(top.suit)!==red(card.suit);}
  function canFoundation(card,suit=card.suit){const f=game.foundations[suit];return card.suit===suit&&((!f.length&&card.rank===1)||(f.at(-1)?.rank===card.rank-1));}
  function removeSelected(){const s=game.selected;if(s.source==='waste') return [game.waste.pop()];if(s.source==='foundation') return [game.foundations[s.suit].pop()];if(s.source==='tableau') return game.tableau[s.col].splice(s.idx);return [];}
  function moveToTableau(col){const s=game.selected;if(!s||!canTableau(s.card,col)) return render('Illegal tableau move.');snapshot();const cards=removeSelected();game.tableau[col].push(...cards);game.moves++;moveScore(s.source==='waste'?'wasteToTableau':s.source==='foundation'?'foundationToTableau':'tableauMove');game.selected=null;maybeReveal(s);render('Moved to tableau.');}
  function moveToFoundation(suit){const s=game.selected;if(!s||s.stack?.length>1||!canFoundation(s.card,suit)) return render('Illegal foundation move.');snapshot();const [card]=removeSelected();game.foundations[suit].push(card);game.moves++;moveScore('toFoundation');game.selected=null;maybeReveal(s);render(`Moved ${rankName(card)} to foundation.`);}
  function maybeReveal(sel){if(sel?.source==='tableau'){const top=game.tableau[sel.col].at(-1);if(top&&!top.up){top.up=true;moveScore('tableauReveal');}}}
  function autoFoundation(cardId){if(cardId){const node=document.querySelector(`[data-card="${cardId}"]`);if(node) selectFrom(node);}const s=game.selected;if(s&&(!s.stack||s.stack.length===1)&&canFoundation(s.card,s.card.suit)) return moveToFoundation(s.card.suit);render('No safe foundation move for that card.');}
  function autoAll(){let moved=false,guard=0;do{moved=false;guard++;const waste=game.waste.at(-1);if(waste&&canFoundation(waste)){game.selected={source:'waste',card:waste,ids:[waste.id]};moveToFoundation(waste.suit);moved=true;continue;}for(let col=0;col<7;col++){const c=game.tableau[col].at(-1);if(c?.up&&canFoundation(c)){game.selected={source:'tableau',col,idx:game.tableau[col].length-1,card:c,stack:[c],ids:[c.id]};moveToFoundation(c.suit);moved=true;break;}}}while(moved&&guard<200);if(!moved) render('No automatic foundation moves available.');}

  function selectByCardId(cardId){
    const node=document.querySelector(`[data-card="${cardId}"]`);
    if(!node) return false;
    selectFrom(node);
    return !!game.selected;
  }
  function tryDropOnElement(target){
    if(!game.selected) return false;
    const foundation=target.closest?.('[data-foundation]');
    const col=target.closest?.('[data-col]');
    if(foundation){moveToFoundation(foundation.dataset.foundation);return true;}
    if(col){moveToTableau(Number(col.dataset.col));return true;}
    return false;
  }
  function clearDropHints(){document.querySelectorAll('.drop-ok,.magnet').forEach(n=>{n.classList.remove('drop-ok','magnet');});}
  function markDropTarget(target){
    clearDropHints();
    if(!game.selected) return;
    const foundation=target.closest?.('[data-foundation]');
    const col=target.closest?.('[data-col]');
    if(foundation&&(!game.selected.stack||game.selected.stack.length===1)&&canFoundation(game.selected.card,foundation.dataset.foundation)) foundation.classList.add('drop-ok','magnet');
    if(col&&canTableau(game.selected.card,Number(col.dataset.col))) col.classList.add('drop-ok','magnet');
  }
  function highlightTargets(){document.querySelectorAll('.hot').forEach(n=>n.classList.remove('hot'));const s=game.selected;if(!s) return;document.querySelectorAll('[data-col]').forEach(n=>{if(canTableau(s.card,Number(n.dataset.col))) n.classList.add('hot');});if((!s.stack||s.stack.length===1)&&canFoundation(s.card,s.card.suit)) document.querySelector(`[data-foundation="${s.card.suit}"]`)?.classList.add('hot');}
  function winCascade(){
    const piles=document.querySelectorAll("[data-foundation]");
    let delay=0;
    piles.forEach(p=>{p.querySelectorAll(".card").forEach((c,i)=>{c.style.transition="transform .5s cubic-bezier(.2,.9,.25,1.2)"; setTimeout(()=>{c.style.transform=`translateY(-${20+i*6}px) rotate(${(Math.random()*6-3)}deg)`;},delay); delay+=40;});});
  }
  function checkWin(){if(game.won) return;const total=Object.values(game.foundations).reduce((n,p)=>n+p.length,0);if(total!==52) return;game.won=true;stopTimer();const best=localStorage.getItem(bestKey);const label=`${game.score} pts · ${game.moves} moves · ${fmt(game.elapsed)}`;if(!best||game.score>Number(best.split(' ')[0])) localStorage.setItem(bestKey,label);el('winText').textContent=`Score ${game.score}, ${game.moves} moves, ${fmt(game.elapsed)}.`;winCascade(); el('win').classList.add('show');}

  document.addEventListener('dragstart',e=>{
    const card=e.target.closest('[data-card]');
    if(!card||!selectByCardId(card.dataset.card)){e.preventDefault();return;}
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',card.dataset.card);
  });
  document.addEventListener('dragend',e=>{e.target.closest?.('[data-card]')?.classList.remove('dragging');clearDropHints();});
  document.addEventListener('dragover',e=>{
    if(!game.selected) return;
    const target=e.target.closest('[data-col],[data-foundation]');
    if(!target) return;
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    markDropTarget(target);
  });
  document.addEventListener('dragleave',e=>{if(!e.relatedTarget||!e.currentTarget?.contains?.(e.relatedTarget)) clearDropHints();});
  document.addEventListener('drop',e=>{
    if(!game.selected) return;
    const target=e.target.closest('[data-col],[data-foundation]');
    if(!target) return;
    e.preventDefault();
    clearDropHints();
    tryDropOnElement(target);
  });
  let audioCtx=null;
  function ping(kind="tap"){
    try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type="triangle";o.frequency.value=(kind==="snap" ? (420+Math.random()*12) : (kind==="bad" ? (150+Math.random()*10) : (260+Math.random()*8)));g.gain.value=.0001;o.connect(g);g.connect(audioCtx.destination);const t=audioCtx.currentTime;g.gain.exponentialRampToValueAtTime(kind==="snap"?.035:.018,t+.012);g.gain.exponentialRampToValueAtTime(.0001,t+(kind==="snap"?.08:.12));o.start(t);o.stop(t+.14);}catch{}
    if(navigator.vibrate){const vib=Math.min(30,8+Math.abs((window.__lastV||0))/25);navigator.vibrate(kind==="snap"?Math.round(vib):kind==="bad"?[18,24,18]:8);}
  }
  function ghostStackOffset(){ return Math.max(14, Math.min(22, Math.round(parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--h')) * .16))); }
  function makeDragGhost(src){
    const ids = game.selected?.ids || [src.dataset.card];
    const nodes = ids.map(id=>document.querySelector(`[data-card="${id}"]`)).filter(Boolean);
    const rect = src.getBoundingClientRect();
    const stack = document.createElement('div');
    stack.className = 'drag-stack';
    stack.style.width = rect.width + 'px';
    stack.style.height = (rect.height + (nodes.length - 1) * ghostStackOffset()) + 'px';
    document.body.appendChild(stack);
    nodes.forEach((node,index)=>{
      const g = node.cloneNode(true);
      g.classList.add('drag-ghost','drag-shadow');
      g.style.position = 'absolute';
      g.style.width = rect.width + 'px';
      g.style.height = rect.height + 'px';
      g.style.left = '0px';
      g.style.top = (index * ghostStackOffset()) + 'px';
      g.style.transform = `rotate(${(index - (nodes.length-1)/2) * .65}deg)`;
      stack.appendChild(g);
    });
    return {ghost:stack,originX:rect.left+rect.width/2,originY:rect.top+rect.height/2,x:rect.left+rect.width/2,y:rect.top+rect.height/2,vx:0,vy:0,tx:rect.left+rect.width/2,ty:rect.top+rect.height/2,raf:0};
  }
  function renderGhost(d){
    const speed=Math.hypot(d.vx,d.vy); window.__lastV = speed;
    const rot = Math.max(-8, Math.min(8, d.vx * .08));
    const skew = Math.max(-5, Math.min(5, d.vx * .035));
    const lift = 1.035 + Math.min(.035, speed/900);
    const stretch = Math.min(1.8, 1 + Math.abs(d.vy)/900);
    d.ghost.style.setProperty('--sh', String(22 + Math.min(18, Math.abs(d.vy)/30)) + 'px');
    d.ghost.classList.toggle('shadow-dyn', true);
    d.ghost.style.transform = `translate3d(${d.x-d.ghost.offsetWidth/2}px,${d.y-28}px,0) rotate(${rot}deg) skewX(${skew}deg) scale(${lift})`;
    d.ghost.querySelectorAll('.card').forEach((card,i)=>{card.style.setProperty('--glx',`${Math.max(18,Math.min(82,50+d.vx*.35))}%`);card.style.setProperty('--gly',`${Math.max(12,Math.min(70,30+d.vy*.18+i*3))}%`);card.style.setProperty('--glo',String(Math.max(.22,Math.min(.62,.28+speed/700))));});
  }
  function autoScrollEdge(x,y){
    const margin=78, speed=16;
    if(y<margin) window.scrollBy(0,-speed); else if(y>window.innerHeight-margin) window.scrollBy(0,speed);
    if(x<margin) window.scrollBy(-speed,0); else if(x>window.innerWidth-margin) window.scrollBy(speed,0);
  }
  function startSpring(d){
    const step=()=>{const k=.24,fr=.70;d.vx=(d.vx+(d.tx-d.x)*k)*fr;d.vy=(d.vy+(d.ty-d.y)*k)*fr;d.x+=d.vx;d.y+=d.vy;renderGhost(d);d.raf=requestAnimationFrame(step);};
    d.raf=requestAnimationFrame(step);
  }
  function stopSpring(d){if(d?.raf) cancelAnimationFrame(d.raf);}
  function targetCenter(target){
    const zone = target.closest('[data-foundation],[data-col]');
    const r = zone.getBoundingClientRect();
    if(zone.matches('[data-col]')){
      const cards = zone.querySelectorAll('.card');
      if(cards.length){const last=cards[cards.length-1].getBoundingClientRect(); return {x:last.left+last.width/2,y:last.top+last.height*.58};}
    }
    return {x:r.left+r.width/2,y:r.top+r.height/2};
  }
  function canDropOn(target){
    if(!game.selected||!target) return false;
    const foundation=target.closest?.('[data-foundation]');
    const col=target.closest?.('[data-col]');
    if(foundation) return (!game.selected.stack||game.selected.stack.length===1)&&canFoundation(game.selected.card,foundation.dataset.foundation);
    if(col) return canTableau(game.selected.card,Number(col.dataset.col));
    return false;
  }
  function animateGhostTo(d,x,y,kind,done){
    stopSpring(d);
    const speed=Math.hypot(d.vx,d.vy); window.__lastV = speed;
    const dur=kind==='snap-back'?Math.max(220,Math.min(390,340-speed*.08)):Math.max(120,Math.min(260,230-speed*.07));
    d.ghost.classList.add(kind);
    d.ghost.style.transition = kind==='snap-back' ? `transform ${dur}ms cubic-bezier(.22,1.35,.36,1), opacity .24s ease` : `transform ${dur}ms cubic-bezier(.2,.9,.25,1.18), opacity .16s ease`;
    d.ghost.style.transform=`translate3d(${x-d.ghost.offsetWidth/2}px,${y-28}px,0) rotate(0deg) skewX(0deg) scale(${kind==='snap-back'?0.98:1})`;
    if(kind==='snap-back') d.ghost.style.opacity='.72';
    ping(kind==='snap-back'?'bad':'snap');
    setTimeout(()=>{d.ghost.remove();done?.();},dur+35);
  }
  let pointerDrag=null;
  document.addEventListener('pointerdown',e=>{
    const card=e.target.closest('[data-card]');
    if(!card||e.pointerType==='mouse') return;
    pointerDrag={cardId:card.dataset.card,startX:e.clientX,startY:e.clientY,active:false,drag:null};
  });
  document.addEventListener('pointermove',e=>{
    if(!pointerDrag) return;
    const dx=e.clientX-pointerDrag.startX,dy=e.clientY-pointerDrag.startY;
    if(!pointerDrag.active&&Math.hypot(dx,dy)>10){
      if(!selectByCardId(pointerDrag.cardId)){pointerDrag=null;return;}
      const src=document.querySelector(`[data-card="${pointerDrag.cardId}"]`);
      pointerDrag.drag=makeDragGhost(src);pointerDrag.active=true;ping("tap");startSpring(pointerDrag.drag);
    }
    if(pointerDrag.active){
      e.preventDefault();
      pointerDrag.drag.tx=e.clientX; pointerDrag.drag.ty=e.clientY;
      autoScrollEdge(e.clientX,e.clientY);
      const target=document.elementFromPoint(e.clientX,e.clientY);
      if(target) markDropTarget(target);
    }
  },{passive:false});
  document.addEventListener('pointerup',e=>{
    if(!pointerDrag) return;
    const d=pointerDrag.drag, wasActive=pointerDrag.active;
    const target=document.elementFromPoint(e.clientX,e.clientY);
    const ok=wasActive&&d&&canDropOn(target);
    clearDropHints();
    if(!wasActive||!d){pointerDrag=null;return;}
    if(ok){const c=targetCenter(target);animateGhostTo(d,c.x,c.y,'snap',()=>tryDropOnElement(target));}
    else animateGhostTo(d,d.originX,d.originY,'snap-back',()=>render('Snap back: invalid drop.'));
    pointerDrag=null;
  });
  document.addEventListener('click',e=>{const card=e.target.closest('[data-card]');const col=e.target.closest('[data-col]');const f=e.target.closest('[data-foundation]');if(e.target.closest('#stock')) return drawStock();if(card&&!game.selected) return selectFrom(card);if(card&&game.selected&&game.selected.ids.includes(card.dataset.card)){game.selected=null;return render('Selection cleared.');}if(f&&game.selected) return moveToFoundation(f.dataset.foundation);if(col&&game.selected) return moveToTableau(Number(col.dataset.col));if(card) return selectFrom(card);});
  document.addEventListener('dblclick',e=>{const card=e.target.closest('[data-card]');if(card) autoFoundation(card.dataset.card);});
  el('newBtn').onclick=newGame;el('undoBtn').onclick=undo;el('autoBtn').onclick=autoAll;el('winNew').onclick=()=>{el('win').classList.remove('show');newGame();};el('drawMode').onchange=()=>{if(game) game.draw=Number(el('drawMode').value);};
  window.addEventListener('beforeunload',stopTimer);newGame();
})();
</script>
