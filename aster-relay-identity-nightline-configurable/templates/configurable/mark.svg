<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" fill="none">
  <defs>
    <linearGradient id="gEdge" x1="20" y1="20" x2="140" y2="140" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#74efff"/>
      <stop offset="0.45" stop-color="#6e58ff"/>
      <stop offset="1" stop-color="#ff69d6"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- stepped pixel panel -->
  <path d="M28 12H132L148 28V132L132 148H28L12 132V28L28 12Z" fill="#090b16" stroke="#2f3b78" stroke-width="3"/>
  <path d="M28 12H132L148 28" stroke="#62f7ff" stroke-opacity=".26" stroke-width="2" filter="url(#glow)"/>
  <!-- pixel grid -->
  <g opacity=".12">
    <path d="M24 20V140" stroke="#dfe4ff" stroke-width="1"/><path d="M40 20V140" stroke="#dfe4ff" stroke-width="1"/><path d="M56 20V140" stroke="#dfe4ff" stroke-width="1"/><path d="M72 20V140" stroke="#dfe4ff" stroke-width="1"/><path d="M88 20V140" stroke="#dfe4ff" stroke-width="1"/><path d="M104 20V140" stroke="#dfe4ff" stroke-width="1"/><path d="M120 20V140" stroke="#dfe4ff" stroke-width="1"/><path d="M136 20V140" stroke="#dfe4ff" stroke-width="1"/>
    <path d="M20 24H140" stroke="#dfe4ff" stroke-width="1"/><path d="M20 40H140" stroke="#dfe4ff" stroke-width="1"/><path d="M20 56H140" stroke="#dfe4ff" stroke-width="1"/><path d="M20 72H140" stroke="#dfe4ff" stroke-width="1"/><path d="M20 88H140" stroke="#dfe4ff" stroke-width="1"/><path d="M20 104H140" stroke="#dfe4ff" stroke-width="1"/><path d="M20 120H140" stroke="#dfe4ff" stroke-width="1"/><path d="M20 136H140" stroke="#dfe4ff" stroke-width="1"/>
  </g>
  <!-- central relay ring -->
  <circle cx="80" cy="80" r="33" stroke="url(#gEdge)" stroke-width="5" filter="url(#glow)"/>
  <circle cx="80" cy="80" r="11" fill="#dfe4ff" fill-opacity=".12" stroke="#dfe4ff" stroke-width="3"/>
  <path d="M80 46V62M98 80H114M80 98V114M46 80H62" stroke="#f5f7ff" stroke-width="4" stroke-linecap="square"/>
  <!-- 8-bit star nodes -->
  <g stroke="url(#gEdge)" stroke-width="3" fill="#090b16">
    <path d="M80 20h8v8h-8zM72 28h8v8h-8zM80 28h8v8h-8zM88 28h8v8h-8zM80 36h8v8h-8z"/>
    <path d="M120 80h8v8h-8zM112 72h8v8h-8zM112 80h8v8h-8zM112 88h8v8h-8zM104 80h8v8h-8z"/>
    <path d="M80 120h8v8h-8zM72 112h8v8h-8zM80 112h8v8h-8zM88 112h8v8h-8zM80 104h8v8h-8z"/>
    <path d="M40 80h8v8h-8zM48 72h8v8h-8zM48 80h8v8h-8zM48 88h8v8h-8zM56 80h8v8h-8z"/>
  </g>
  <!-- subtle handstyle slash -->
  <path d="M36 118C54 102 88 102 112 120" stroke="#ff69d6" stroke-opacity=".62" stroke-width="3" stroke-linecap="round"/>
  <circle cx="119" cy="122" r="2.6" fill="#ff69d6"/>
