name: Build and Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install dependencies (ethic-brawl)
        run: npm install
        working-directory: ethic-brawl

      - name: Install dependencies (v11-peer-daw)
        run: npm install
        working-directory: v11-peer-daw

      - name: Prepare CI source catalog
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const sourcePath = path.resolve('app-hub-v11/artifacts.source.json');
          const outPath = path.resolve('.artifacts.source.ci.json');
          const source = JSON.parse(fs.readFileSync(sourcePath, 'utf8'));
          source.items = (source.items || []).filter((item) => {
            const includePath = item?.deploy?.includePath;
            const buildCwd = item?.deploy?.build?.cwd;
            const href = String(item?.href || '').split('?')[0].split('#')[0];
            if (buildCwd && !fs.existsSync(path.resolve(buildCwd))) return false;
            if (includePath && !fs.existsSync(path.resolve(includePath))) return false;
            if ((href.startsWith('../') || href.startsWith('./')) && !item?.deploy?.includePath) {
              const local = href.replace(/^\.\.\//, '').replace(/^\.\//, '');
              const top = local.split('/')[0];
              if (top && !fs.existsSync(path.resolve(top))) return false;
            }
            return true;
          });
          fs.writeFileSync(outPath, JSON.stringify(source, null, 2));
          NODE

      - name: Materialize deploy stage
        run: node app-hub-v11/server/artifact-build.mjs --source .artifacts.source.ci.json --out .artifacts-pages-stage

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: .artifacts-pages-stage

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5