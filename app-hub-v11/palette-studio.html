<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Palette Studio · NEXUS v11</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #081018;
        --panel: #0d1a29;
        --line: #1f4463;
        --fg: #eaf7ff;
        --muted: #9fb8c9;
        --accent: #38d7ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Share Tech Mono", ui-monospace, monospace;
        color: var(--fg);
        background:
          radial-gradient(circle at 12% 0, #1c4566, transparent 40%),
          radial-gradient(circle at 90% 20%, #43245f, transparent 36%),
          linear-gradient(145deg, #070e16, #0a1522 58%, #04080f);
      }
      .shell { max-width: 1200px; margin: 0 auto; padding: 1rem; display: grid; gap: 0.8rem; }
      .card {
        background: color-mix(in srgb, var(--panel), #0a111a 20%);
        border: 1px solid color-mix(in srgb, var(--line), transparent 20%);
        border-radius: 14px;
        padding: 0.85rem;
        box-shadow: 0 10px 24px rgba(0,0,0,.35);
      }
      .row { display: flex; gap: .55rem; flex-wrap: wrap; align-items: center; }
      .between { justify-content: space-between; }
      h1,h2,h3 { margin: 0; font-family: Orbitron, "Share Tech Mono", monospace; letter-spacing: .08em; }
      h1 { font-size: 1.05rem; }
      .muted { color: var(--muted); }
      button, input, select {
        font: inherit; color: inherit;
        border: 1px solid color-mix(in srgb, var(--line), transparent 10%);
        background: #071321;
        border-radius: 10px;
        padding: .45rem .62rem;
      }
      button { cursor: pointer; }
      .grid { display: grid; gap: .7rem; grid-template-columns: 1fr 1fr; }
      @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
      .swatches { display: grid; grid-template-columns: repeat(auto-fill, minmax(42px, 1fr)); gap: .45rem; }
      .swatch {
        aspect-ratio: 1;
        border: 1px solid color-mix(in srgb, var(--line), transparent 10%);
        border-radius: 10px;
        position: relative;
      }
      .swatch code {
        position: absolute; left: 50%; bottom: -1.15rem; transform: translateX(-50%);
        font-size: .62rem; color: #d7ecff;
      }
      .role-grid { display: grid; gap: .5rem; }
      .role-row { display: grid; grid-template-columns: 110px 50px 1fr; gap: .5rem; align-items: center; }
      .preview {
        min-height: 220px;
        border-radius: 12px;
        border: 1px solid color-mix(in srgb, var(--line), transparent 10%);
        padding: .8rem;
      }
      .preview .btn {
        display: inline-block;
        margin-right: .45rem;
        padding: .4rem .65rem;
        border-radius: 999px;
        border: 1px solid var(--accent);
      }
      textarea {
        width: 100%;
        min-height: 120px;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, var(--line), transparent 10%);
        background: #071321;
        color: inherit;
        padding: .65rem;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="card row between">
        <div>
          <h1>Palette Studio</h1>
          <div class="muted">Infer readable, UX-safe palettes from seed colors.</div>
        </div>
        <div class="row">
          <a href="index.html" class="muted">← back to hub</a>
          <input id="imageInput" type="file" accept="image/*" />
        </div>
      </section>

      <section class="grid">
        <section class="card">
          <h2>Seeds</h2>
          <div class="row" style="margin-top:.6rem">
            <label>Seed A <input id="seedA" type="color" value="#00d8ff" /></label>
            <label>Seed B <input id="seedB" type="color" value="#6a5cff" /></label>
            <label>Seed C <input id="seedC" type="color" value="#ff4fd8" /></label>
            <button id="infer">infer palette</button>
          </div>
          <div id="swatches" class="swatches" style="margin-top:1rem"></div>
        </section>

        <section class="card">
          <h2>Role Mapping</h2>
          <div id="roles" class="role-grid" style="margin-top:.6rem"></div>
        </section>
      </section>

      <section class="card grid">
        <section>
          <h3>Preview</h3>
          <div id="preview" class="preview" style="margin-top:.6rem"></div>
        </section>
        <section>
          <h3>CSS Variables</h3>
          <textarea id="cssOut" readonly style="margin-top:.6rem"></textarea>
          <div class="row" style="margin-top:.5rem">
            <button id="copy">copy css</button>
          </div>
        </section>
      </section>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const roles = ["primary","secondary","accent","bg","surface","text"];
      const state = { palette: [], roleMap: {} };

      const hexToRgb = (h) => ({ r: parseInt(h.slice(1,3),16), g: parseInt(h.slice(3,5),16), b: parseInt(h.slice(5,7),16) });
      const rgbToHex = (r,g,b) => "#"+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,"0")).join("");
      const mix = (a,b,t) => {
        const x=hexToRgb(a), y=hexToRgb(b);
        return rgbToHex(x.r+(y.r-x.r)*t, x.g+(y.g-x.g)*t, x.b+(y.b-x.b)*t);
      };
      const lum = (h)=>{const c=hexToRgb(h); return (c.r*.2126+c.g*.7152+c.b*.0722)/255;};
      const sat = (h)=>{const c=hexToRgb(h); const max=Math.max(c.r,c.g,c.b), min=Math.min(c.r,c.g,c.b); return max? (max-min)/max:0;};

      function infer(seedA, seedB, seedC) {
        const p = [
          seedA,
          mix(seedA, seedB, .35),
          seedB,
          mix(seedB, seedC, .4),
          seedC,
          mix(seedC, seedA, .5),
          mix(seedA, "#ffffff", .6),
          mix(seedB, "#000000", .72)
        ];
        const bySat = [...p].sort((a,b)=>sat(b)-sat(a));
        const byLum = [...p].sort((a,b)=>lum(b)-lum(a));
        state.roleMap = {
          primary: bySat[0],
          secondary: bySat[1],
          accent: bySat[2],
          bg: byLum.at(-1),
          surface: mix(byLum.at(-1), bySat[1], .22),
          text: byLum[0],
        };
        state.palette = p;
      }

      function render() {
        $("swatches").innerHTML = state.palette.map(c=>`<div class="swatch" style="background:${c}"><code>${c}</code></div>`).join("");
        $("roles").innerHTML = roles.map(r=>`<label class="role-row"><span>${r}</span><input data-role="${r}" type="color" value="${state.roleMap[r]}"><code>${state.roleMap[r]}</code></label>`).join("");
        for (const input of $("roles").querySelectorAll("input[data-role]")) {
          input.oninput = () => { state.roleMap[input.dataset.role] = input.value; render(); };
        }
        const css = `:root {\n  --hub-accent: ${state.roleMap.accent};\n  --hub-background: ${state.roleMap.bg};\n  --hub-surface: ${state.roleMap.surface};\n  --hub-text: ${state.roleMap.text};\n  --generated-primary: ${state.roleMap.primary};\n  --generated-secondary: ${state.roleMap.secondary};\n}`;
        $("cssOut").value = css;
        $("preview").style.background = `linear-gradient(145deg, ${state.roleMap.bg}, ${mix(state.roleMap.bg, "#000", .4)})`;
        $("preview").style.color = state.roleMap.text;
        $("preview").innerHTML = `<h3 style="margin:0 0 .5rem 0">Preview Surface</h3><p class="muted" style="margin:.2rem 0 .8rem 0">Auto-balanced for readability and contrast.</p><span class="btn" style="border-color:${state.roleMap.primary}; color:${state.roleMap.primary}">Primary Action</span><span class="btn" style="border-color:${state.roleMap.secondary}; color:${state.roleMap.secondary}">Secondary</span><span class="btn" style="border-color:${state.roleMap.accent}; color:${state.roleMap.accent}">Accent</span>`;
      }

      async function inferFromImage(file) {
        const bitmap = await createImageBitmap(file);
        const canvas = document.createElement("canvas");
        const scale = Math.min(1, 120 / Math.max(bitmap.width, bitmap.height));
        canvas.width = Math.max(1, Math.round(bitmap.width * scale));
        canvas.height = Math.max(1, Math.round(bitmap.height * scale));
        const ctx = canvas.getContext("2d", { willReadFrequently: true });
        ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
        const data = ctx.getImageData(0,0,canvas.width,canvas.height).data;
        const map = new Map();
        for (let i=0; i<data.length; i+=16) {
          if (data[i+3] < 150) continue;
          const key = `${Math.round(data[i]/24)*24},${Math.round(data[i+1]/24)*24},${Math.round(data[i+2]/24)*24}`;
          map.set(key, (map.get(key)||0)+1);
        }
        const top = [...map.entries()].sort((a,b)=>b[1]-a[1]).slice(0,3).map(([k])=>{
          const [r,g,b]=k.split(",").map(Number); return rgbToHex(r,g,b);
        });
        if (top.length >= 3) {
          $("seedA").value = top[0];
          $("seedB").value = top[1];
          $("seedC").value = top[2];
          infer(top[0], top[1], top[2]);
          render();
        }
      }

      $("infer").onclick = () => {
        infer($("seedA").value, $("seedB").value, $("seedC").value);
        render();
      };
      $("copy").onclick = async () => {
        await navigator.clipboard?.writeText($("cssOut").value);
      };
      $("imageInput").onchange = async () => {
        const f = $("imageInput").files?.[0];
        if (f) await inferFromImage(f);
      };

      infer($("seedA").value, $("seedB").value, $("seedC").value);
      render();
    </script>
  </body>
</html>
