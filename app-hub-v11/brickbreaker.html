<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NEXUS BrickBreaker Coop</title>
<style>
:root {
  --bg:#050816;
  --panel:#0c122b;
  --line:#22335f;
  --text:#d7e2ff;
}
* { box-sizing:border-box; }
body {
  margin:0;
  background:radial-gradient(circle at top,#10193f,#050816 60%);
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;
  overflow:hidden;
}
#hud {
  display:flex;
  flex-wrap:wrap;
  gap:.75rem;
  padding:.7rem 1rem;
  background:rgba(10,14,30,.88);
  border-bottom:1px solid var(--line);
  backdrop-filter:blur(10px);
}
.badge {
  padding:.28rem .75rem;
  border:1px solid #2b4b89;
  border-radius:999px;
  background:rgba(255,255,255,.03);
  box-shadow:0 0 18px rgba(80,120,255,.12);
}
canvas {
  display:block;
  margin:0 auto;
}
</style>
</head>
<body>
<div id="hud">
  <span class="badge" id="score">score: 0</span>
  <span class="badge" id="lives">lives: 3</span>
  <span class="badge" id="level">level: 1</span>
  <span class="badge" id="network">offline</span>
  <span class="badge" id="players">players: 1</span>
  <span>strict coop · one paddle per player · arrows/a-d + space + shift</span>
</div>
<canvas id="game" width="760" height="560"></canvas>
<script type="module">
import {
  applyInput,
  applySnapshot,
  activatePowerup,
  createInitialState,
  createSnapshot,
  hashState,
  stepState,
  syncCoopPlayers,
} from './lib/brickbreaker-core.mjs';
import { createBrickbreakerAudio } from './lib/brickbreaker-audio.mjs';
import { createBrickbreakerPeernetNetwork } from './lib/brickbreaker-peernet.mjs';
import { createNoopNetwork } from './lib/network.js';

const multiplayer = new URL(location.href).searchParams.get('multiplayer') === 'true';
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const localId = `p-${Math.random().toString(36).slice(2, 8)}`;
const state = createInitialState({ players: [localId] });
const audio = createBrickbreakerAudio();
const keys = new Set();
let wasBallCount = state.balls.length;
let wasBrickCount = state.bricks.length;
let wasLives = state.lives;

const network = multiplayer
  ? createBrickbreakerPeernetNetwork({ localId })
  : createNoopNetwork();

addEventListener('pointerdown', () => audio.unlock(), { once: true });
addEventListener('keydown', (event) => {
  audio.unlock();
  keys.add(event.key);
});
addEventListener('keyup', (event) => keys.delete(event.key));

network.on('players', (ids) => {
  syncCoopPlayers(state, ids);
  document.getElementById('players').textContent = `players: ${ids.length}`;
  if (state.authority.hostId === localId) network.broadcast('snapshot', createSnapshot(state, { hostId: localId }));
});

network.on('remote-input', ({ playerId, input }) => {
  applyInput(state, playerId, input);
});

network.on('snapshot', (snapshot) => {
  if (!snapshot || snapshot.authority?.hostId === localId) return;
  if (snapshot.tick >= state.tick || hashState(state) !== snapshot.checksum) applySnapshot(state, snapshot);
});

network.on('resync-request', ({ requester }) => {
  if (state.authority.hostId === localId) network.broadcast('snapshot', createSnapshot(state, { hostId: localId, requester }));
});

function tick() {
  const input = {
    dx: keys.has('ArrowLeft') || keys.has('a') ? -9 : keys.has('ArrowRight') || keys.has('d') ? 9 : 0,
    launch: keys.has(' '),
    fire: keys.has('Shift'),
  };

  applyInput(state, localId, input);
  network.broadcast('remote-input', { playerId: localId, input });

  for (const drop of state.drops) {
    drop.y += 2.2;
    for (const player of Object.values(state.players)) {
      if (drop.y >= player.y && drop.x >= player.x && drop.x <= player.x + player.w) {
        activatePowerup(state, player.id, drop.type);
        drop.y = 9999;
      }
    }
  }
  state.drops = state.drops.filter((drop) => drop.y < state.height + 20);

  const isHost = state.authority.hostId === localId || !multiplayer;
  if (isHost) {
    stepState(state);
    if (multiplayer && state.tick % 30 === 0) network.broadcast('snapshot', createSnapshot(state, { hostId: localId }));
  } else if (state.tick % 90 === 0) {
    network.broadcast('resync-request', { requester: localId });
  }

  playDeltaSounds();
  render();
  requestAnimationFrame(tick);
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const bg = ctx.createLinearGradient(0, 0, 0, canvas.height);
  bg.addColorStop(0, '#10193f');
  bg.addColorStop(1, '#050816');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (const brick of state.bricks) {
    const g = ctx.createLinearGradient(brick.x, brick.y, brick.x, brick.y + brick.h);
    g.addColorStop(0, brick.hp > 1 ? '#ff8fab' : '#69e2ff');
    g.addColorStop(1, brick.hp > 1 ? '#b83280' : '#2563eb');
    ctx.fillStyle = g;
    roundRect(ctx, brick.x, brick.y, brick.w, brick.h, 5, true);
    ctx.strokeStyle = 'rgba(255,255,255,.15)';
    ctx.stroke();
    if (brick.powerup) {
      ctx.fillStyle = '#ffe066';
      ctx.beginPath();
      ctx.arc(brick.x + brick.w / 2, brick.y + brick.h / 2, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  for (const drop of state.drops) {
    ctx.fillStyle = '#8affc1';
    ctx.beginPath();
    ctx.arc(drop.x, drop.y, 8, 0, Math.PI * 2);
    ctx.fill();
  }

  for (const particle of state.particles || []) {
    ctx.globalAlpha = Math.max(0, particle.life / 24);
    ctx.fillStyle = particle.color;
    ctx.beginPath();
    ctx.arc(particle.x, particle.y, 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  for (const shot of state.shots) {
    ctx.fillStyle = shot.color || '#ff3344';
    ctx.fillRect(shot.x - 2, shot.y - 10, 4, 20);
  }

  for (const player of Object.values(state.players)) {
    const glow = ctx.createLinearGradient(player.x, player.y, player.x, player.y + player.h);
    glow.addColorStop(0, player.color);
    glow.addColorStop(1, '#ffffff');
    ctx.shadowBlur = 16;
    ctx.shadowColor = player.color;
    ctx.fillStyle = glow;
    roundRect(ctx, player.x, player.y, player.w, player.h, 8, true);
    ctx.shadowBlur = 0;
  }

  for (const ball of state.balls) {
    const radial = ctx.createRadialGradient(ball.x - 2, ball.y - 2, 1, ball.x, ball.y, ball.r + 3);
    radial.addColorStop(0, '#ffffff');
    radial.addColorStop(1, '#69e2ff');
    ctx.fillStyle = radial;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
  }

  document.getElementById('score').textContent = `score: ${state.score}`;
  document.getElementById('lives').textContent = `lives: ${state.lives}`;
  document.getElementById('level').textContent = `level: ${state.levelIndex + 1}`;
  document.getElementById('network').textContent = multiplayer
    ? `${network.status} · host ${state.authority.hostId === localId ? 'you' : state.authority.hostId || '?'}`
    : 'offline solo';
}

network.on?.('status', ({ hostId }) => {
  if (hostId) state.authority.hostId = hostId;
});

function playDeltaSounds() {
  if (state.bricks.length < wasBrickCount) audio.brick();
  if (state.drops.length > 0 && state.balls.length > wasBallCount) audio.powerup();
  if (state.lives < wasLives) audio.lifeLost();
  wasBallCount = state.balls.length;
  wasBrickCount = state.bricks.length;
  wasLives = state.lives;
}

function roundRect(ctx, x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  if (fill) ctx.fill();
}

render();
requestAnimationFrame(tick);
</script>
</body>
</html>
